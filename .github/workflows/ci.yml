name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  # Only cancel in-progress runs on PRs (stale pushes). Never cancel main —
  # tag pushes were cancelling version-bump CI, leaving the badge red.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          # nexus-2fyb: cache ~/.cache/uv to avoid cold-downloading torch
          # (~2.8 GB CPU wheel) every CI run. mineru[all] was promoted to
          # a default dep, so without cache the install + sync takes ~10m
          # and risks exceeding the job timeout. Key on uv.lock.
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache ChromaDB ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          # nexus-8g79.33: include uv.lock hash so a chromadb bump that
          # ships a new ONNX model invalidates the cache; pre-fix the
          # bare runner-OS key reused stale models across upgrades.
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v

  migration-race-probe:
    # nexus-9eaz: the two concurrent-migration tests below are skip-marked
    # in the main suite because they fail intermittently when the full
    # 6800-test pytest session is in flight. This job runs them in
    # isolation (their own pytest invocation, no prior test pollution)
    # so we can tell whether the race is intrinsic to the apply_pending
    # lock semantics on Linux or whether it is process-state pollution.
    #
    # Outcome:
    #   - probe passes consistently: race is process-pollution from
    #     earlier tests; root-cause lives in the test harness, not in
    #     apply_pending.
    #   - probe fails: race is intrinsic to apply_pending under Linux/CI;
    #     INFO-level instrumentation in #811 + #814 captures evidence
    #     in the log output.
    #
    # Job is non-blocking on the main suite (continue-on-error) so a
    # flake here does not red-bar PRs while the investigation is open.
    name: migration race probe (nexus-9eaz, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Run isolated concurrent-migration tests (un-skip override)
        # NEXUS_RUN_FLAKY_MIGRATION_TESTS=1 instructs the skip markers
        # in tests/test_migrations.py to no-op. The tests then run in
        # this fresh pytest process with no prior test pollution.
        env:
          NEXUS_RUN_FLAKY_MIGRATION_TESTS: "1"
        run: |
          uv run pytest \
            tests/test_migrations.py::TestApplyPending::test_concurrent_apply_pending_runs_once \
            tests/test_migrations.py::TestApplyPending::test_concurrent_apply_pending_stress \
            -v \
            --log-cli-level=INFO

  migration-race-bisect:
    # nexus-9eaz Phase C: bisect the pre-test_migrations cohort to find the
    # contaminating test(s). The four chunks divide tests/*.py alphabetically
    # into quarters that precede test_migrations.py. Each chunk job runs its
    # chunk followed by the two flaky concurrent-migration tests, with the
    # un-skip env var enabled. Whichever chunk fails identifies the cohort
    # containing the polluter; we can then sub-bisect.
    #
    # Non-blocking (continue-on-error) so a flake here does not red-bar PRs.
    name: migration race bisect chunk ${{ matrix.chunk }} (nexus-9eaz, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        chunk: [4a, 4b, 4c, 4d]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache ChromaDB ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Compute chunk file list
        id: chunk
        run: |
          # All tests/*.py files alphabetically before test_migrations.py,
          # split into 4 chunks of ~46 files each. Then append the flaky
          # tests so contamination from the chunk surfaces as a failure.
          ls tests/*.py | sort > /tmp/all.txt
          PRE_COUNT=$(grep -n '^tests/test_migrations\.py\$' /tmp/all.txt | head -1 | cut -d: -f1)
          PRE_COUNT=$((PRE_COUNT - 1))
          # Sub-bisect chunk 4 (lines 139..183, 45 files) into 4 sub-chunks of ~12 files each
          CHUNK4_START=139
          CHUNK4_END=$PRE_COUNT
          CHUNK4_SIZE=$(( CHUNK4_END - CHUNK4_START + 1 ))
          SUB_SIZE=$(( (CHUNK4_SIZE + 3) / 4 ))
          case "${{ matrix.chunk }}" in
            4a) IDX=0 ;;
            4b) IDX=1 ;;
            4c) IDX=2 ;;
            4d) IDX=3 ;;
          esac
          START=$(( CHUNK4_START + IDX * SUB_SIZE ))
          END=$(( START + SUB_SIZE - 1 ))
          if [ $END -gt $CHUNK4_END ]; then END=$CHUNK4_END; fi
          sed -n "${START},${END}p" /tmp/all.txt > /tmp/chunk.txt
          echo "sub-chunk ${{ matrix.chunk }}: $(wc -l < /tmp/chunk.txt) files (lines $START..$END)"
          cat /tmp/chunk.txt
          # Emit pytest argv: chunk files + flaky tests pinned at end.
          {
            cat /tmp/chunk.txt
            echo "tests/test_migrations.py::TestApplyPending::test_concurrent_apply_pending_runs_once"
            echo "tests/test_migrations.py::TestApplyPending::test_concurrent_apply_pending_stress"
          } | tr '\n' ' ' > /tmp/argv.txt
          echo "argv=$(cat /tmp/argv.txt)" >> "$GITHUB_OUTPUT"

      - name: Run chunk + flaky tests
        env:
          NEXUS_RUN_FLAKY_MIGRATION_TESTS: "1"
        run: |
          # -p no:randomly preserves alphabetical order so the chunk runs
          # before the flaky tests deterministically. -x stops at first
          # failure so we get the contaminating test's name in the log.
          uv run pytest -p no:randomly -x --tb=short \
            $(cat /tmp/argv.txt)
