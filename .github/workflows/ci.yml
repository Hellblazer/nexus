name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  # Only cancel in-progress runs on PRs (stale pushes). Never cancel main —
  # tag pushes were cancelling version-bump CI, leaving the badge red.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    # nexus-2ivn: split into two parallel partitions so wall-time is
    # max(core, daemon) instead of sum. Suite grew from ~12 min to
    # 20+ min as 387 new test files landed in the last 60 days
    # (RDR-112 daemon-mode flips, RDR-108, RDR-110, etc.). Splitting
    # preserves full coverage; daemon-mode tests stay together in
    # one partition because they share UDS / chroma state and would
    # race under intra-partition parallelism.
    name: pytest ${{ matrix.partition }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Core partition still lands close to the 20-min mark on a fresh
    # CI runner; bumping to 30 ensures pytest reaches the FAILURES
    # summary so failed-test tracebacks surface in the log rather
    # than being killed mid-summary by the timeout. nexus-2ivn
    # follow-up: 3-way split (core-a / core-b) to bring this back
    # down to ~15 min per partition.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        partition: [core, daemon]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          # setup-uv's bundled enable-cache only restored ~1 MB of
          # metadata in practice; the actual wheel cache was missing
          # and torch (~847 MB) re-downloaded on every run. The
          # explicit actions/cache@v4 step below targets
          # ``~/.cache/uv`` directly so the wheel cache rehydrates.
          enable-cache: false

      - name: Cache uv wheel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          # Key on uv.lock so a dep change rebuilds; restore-keys
          # falls back to the last cache for the same python so a
          # uv.lock bump still seeds most of the wheels and only
          # the changed packages re-download.
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Cache ChromaDB ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          # nexus-8g79.33: include uv.lock hash so a chromadb bump that
          # ships a new ONNX model invalidates the cache; pre-fix the
          # bare runner-OS key reused stale models across upgrades.
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Run tests
        # core: everything except daemon-mode files (the heavy daemon
        # spawn/teardown work goes to the daemon partition).
        # daemon: every tests/daemon/** file plus the daemon-mode
        # CLI smokes in tests/commands/ and tests/catalog/.
        # shopt -s nullglob so empty globs (e.g. tests/catalog/ on a
        # branch where the daemon parity tests have not landed yet)
        # do not pass a literal pattern to pytest.
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          case "${{ matrix.partition }}" in
            core)
              uv run pytest tests/ -v \
                --ignore=tests/daemon \
                --ignore-glob='tests/commands/test_*_daemon_mode.py' \
                --ignore-glob='tests/catalog/test_*_daemon_*.py'
              ;;
            daemon)
              daemon_files=(
                tests/commands/test_*_daemon_mode.py
                tests/catalog/test_*_daemon_*.py
              )
              uv run pytest tests/daemon "${daemon_files[@]}" -v
              ;;
          esac

  migration-race-probe:
    # nexus-9eaz: the two concurrent-migration tests below are skip-marked
    # in the main suite because they fail intermittently when the full
    # 6800-test pytest session is in flight. This job runs them in
    # isolation (their own pytest invocation, no prior test pollution)
    # so we can tell whether the race is intrinsic to the apply_pending
    # lock semantics on Linux or whether it is process-state pollution.
    #
    # Outcome:
    #   - probe passes consistently: race is process-pollution from
    #     earlier tests; root-cause lives in the test harness, not in
    #     apply_pending.
    #   - probe fails: race is intrinsic to apply_pending under Linux/CI;
    #     INFO-level instrumentation in #811 + #814 captures evidence
    #     in the log output.
    #
    # Job is non-blocking on the main suite (continue-on-error) so a
    # flake here does not red-bar PRs while the investigation is open.
    name: migration race probe (nexus-9eaz, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Run isolated concurrent-migration tests (un-skip override)
        # NEXUS_RUN_FLAKY_MIGRATION_TESTS=1 instructs the skip markers
        # in tests/test_migrations.py to no-op. The tests then run in
        # this fresh pytest process with no prior test pollution.
        env:
          NEXUS_RUN_FLAKY_MIGRATION_TESTS: "1"
        run: |
          uv run pytest \
            tests/test_migrations.py::TestApplyPending::test_concurrent_apply_pending_runs_once \
            tests/test_migrations.py::TestApplyPending::test_concurrent_apply_pending_stress \
            -v \
            --log-cli-level=INFO

  storage-boundary-lint:
    # RDR-112 §5 (nexus-b43y): static lint for direct sqlite3.connect /
    # chromadb.PersistentClient calls outside src/nexus/daemon/ and
    # src/nexus/db/. Standalone fast gate so a regression surfaces in
    # seconds, not after the full pytest suite. The --fail-on-violation
    # flag makes the lint a hard gate regardless of NX_STORAGE_MODE.
    name: storage-boundary lint (RDR-112 §5)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Lint storage substrate boundary
        run: uv run nx doctor --check-storage-boundary --fail-on-violation
