name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  # Only cancel in-progress runs on PRs (stale pushes). Never cancel main —
  # tag pushes were cancelling version-bump CI, leaving the badge red.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    # nexus-ls88v (epic nexus-whh61 F7): the structlog-only / no-print-in-library
    # / audited-broad-except discipline was previously convention-only — 73
    # BLE001 + 284 PLC0415 noqa were version-controlled but unenforced because no
    # CI lint job existed. This job runs the committed [tool.ruff] ruleset so a
    # NEW print()/blind-except/lazy-import that lacks a justified per-line noqa
    # fails the PR. Ruff is pinned to the version the F7 audit was performed with
    # so local `uv run ruff` (>=0.15.18) and CI agree on rule behaviour.
    name: ruff lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Lint src/ with ruff
        # uvx fetches the standalone ruff (no project build / heavy-dep sync).
        # Pinned exact for determinism; the [tool.ruff] config in pyproject.toml
        # is read automatically.
        run: uvx ruff@0.15.18 check src/

  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # 30m: the suite runs ~16m on the runners and the post-job cache-save
    # step counts toward this budget. At 20m a v5.4.2 release run timed
    # out DURING the cache upload (tests had already passed). Raised 25->30
    # (nexus-cxsbs) to absorb the HF/docling model cache save (~hundreds of
    # MB) and a cold-cache model fetch on the first run after a uv.lock bump.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          python-version: ${{ matrix.python-version }}
          # nexus-2ivn: setup-uv's bundled enable-cache only restored
          # ~1 MB of metadata in practice; the actual wheel cache was
          # missing and torch (~847 MB) re-downloaded on every run.
          # Disable the bundled cache and target the directory setup-uv
          # actually uses (UV_CACHE_DIR = ${{ runner.temp }}/setup-uv-
          # cache, not ~/.cache/uv) with an explicit actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
          # step below.
          enable-cache: false

      - name: Cache uv wheel cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ${{ runner.temp }}/setup-uv-cache
          # Key on uv.lock so a dep change rebuilds; restore-keys
          # falls back to the last cache for the same python so a
          # uv.lock bump still seeds most of the wheels and only
          # the changed packages re-download.
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Cache ChromaDB ONNX model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/chroma
          # nexus-8g79.33: include uv.lock hash so a chromadb bump that
          # ships a new ONNX model invalidates the cache; pre-fix the
          # bare runner-OS key reused stale models across upgrades.
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          # nexus-c7gnx: fall back to the last ONNX cache for this OS so a
          # routine uv.lock bump (which rarely changes the bundled ONNX model)
          # re-seeds it instead of re-downloading from scratch every time.
          restore-keys: |
            chromadb-onnx-${{ runner.os }}-

      - name: Cache HuggingFace models (docling, cross-encoder, MinerU)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          # nexus-cxsbs: the docling PDF extractor downloads its layout +
          # TableFormer models from HuggingFace at test time; an unreliable
          # fetch raised LocalEntryNotFoundError -> silent PyMuPDF fallback ->
          # ~21 test_pdf_extractor_integration failures (the recurring
          # "docling flake"). Cache the whole HF hub dir so the models persist
          # across runs. A cache written on develop/main is restorable by every
          # PR via the base-branch fallback, so this is shared across branches.
          # Same dir also holds the cross-encoder reranker and (under -m slow)
          # MinerU's weights, so one cache covers all HF-backed models.
          path: ~/.cache/huggingface
          # Key on uv.lock so a docling/transformers bump (new model) busts it;
          # restore-keys seeds from the last cache so unchanged models persist.
          key: huggingface-models-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            huggingface-models-${{ runner.os }}-

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Pre-fetch docling models (deterministic, retryable)
        # nexus-cxsbs: warm the docling models BEFORE pytest so the flaky
        # mid-test HF download becomes a deterministic up-front fetch that is
        # allowed to retry. No-op on a cache hit; on a cold cache it downloads
        # once (then the post-job cache-save persists it).
        #
        # nexus-c7gnx: the probe now runs a REAL extraction (docling loads its
        # models lazily at convert() time, so merely building the converter does
        # NOT download them). And it HARD-FAILS after 3 attempts: a cold cache +
        # transient HF outage then fails LOUDLY here ("docling models could not
        # be fetched") instead of silently falling back to PyMuPDF mid-suite and
        # producing ~21 baffling extraction_method=='docling' assertion failures.
        # A real extraction must yield extraction_method=='docling' (a one-line
        # python -c; no heredoc, so YAML indentation stays intact). Probe lives in
        # scripts/ci_warm_docling.py for readability.
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if uv run python scripts/ci_warm_docling.py; then echo "docling models warm"; exit 0; fi
            echo "docling pre-fetch attempt $i did not yield docling extraction"
            if [ "$i" -lt 3 ]; then echo "retrying in 10s"; sleep 10; fi
          done
          echo "::error::docling models could not be fetched after 3 attempts (cold HF cache + HuggingFace unavailable). Failing the job here rather than letting the PDF integration tests fall back to PyMuPDF and fail with confusing assertions." >&2
          exit 1

      - name: Run tests
        run: uv run pytest tests/ -q --durations=25

  ca3-pgvector-bundle:
    # RDR-157 P1 CA-3 gate (bead nexus-vwvv5.2): prove the assemble path — a
    # COMPLETE PG tree + pgvector — can be driven by nx's own provisioner to a
    # cluster that LOADS pgvector, with the binary's glibc floor pinned. This is
    # the go/no-go before the P2/P3 build-out.
    #
    # Strategy B (build from source), NOT zonky. CA-3 empirically falsified the
    # original "zonky reduced bundle + inject pgvector" plan: zonky's
    # embedded-postgres-binaries reduced bundle ships ONLY initdb/pg_ctl/postgres
    # — no pg_config/psql/createdb/headers — so pgvector cannot be built against
    # it AND nx's provisioner (which needs psql+createdb) cannot use it. The RDR
    # pre-authorized Strategy B as the CA-3-failure fallback. See RF-157-9 /
    # T2 nexus_rdr/157-CA3-FINDING-zonky-reduced-insufficient.
    #
    # Both linux targets run live (nexus-xqk5r closed aarch64). mac-arm64 runs
    # live in the separate ca3-pgvector-bundle-macos job below (nexus-0ixqc) — it
    # needs a darwin variant (vector.dylib / dyld / otool minos floor, not GLIBC).
    name: CA-3 live (PG from source + pgvector, ${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          # arch values are the check-context suffixes; keep stable (branch
          # protection requires "...(linux-amd64)" and "...(linux-arm64)").
          - { arch: linux-amd64, runner: ubuntu-latest,    image: "quay.io/pypa/manylinux_2_28_x86_64" }
          - { arch: linux-arm64, runner: ubuntu-24.04-arm, image: "quay.io/pypa/manylinux_2_28_aarch64" }
    env:
      # Pinned for determinism. pgvector >= 0.8 is the RDR-155 iterative_scan floor
      # (a pgvector version, not a PG major). nexus is aligned on PG17 to match the
      # deployed conexus stack (nexus-41bso); PG16 was incidental.
      PG_VERSION: "17.5"
      PGVECTOR_VERSION: "v0.8.2"
      # manylinux_2_28 == glibc 2.28 (AlmaLinux 8 baseline: RHEL8 / Debian 10 /
      # Ubuntu 18.10+), per-arch image from the matrix. Building the tree +
      # vector.so here pins their glibc floor to a broadly compatible baseline
      # instead of the runner's glibc (~2.39), so the binaries dlopen-load on older
      # distros. We deliberately do NOT use manylinux2014 (glibc 2.17 / CentOS 7):
      # CentOS 7 is EOL and its in-container yum mirrors are dead. glibc 2.28 is a
      # defensible 2026 floor. GLIBC_FLOOR=(2,28) in the test holds for both arches.
      MANYLINUX_IMAGE: ${{ matrix.target.image }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      # Path-gate the expensive PG-from-source build. The job ALWAYS runs (so the
      # required status check always reports), but the build/test/smoke steps run
      # only when the assemble surface changed — avoiding a ~10min PG build on
      # every unrelated PR. nexus-vwvv5.6 follow-up.
      # SHA-pinned (not @v3): this filter's `ca3` output gates whether EVERY
      # build/test step in a REQUIRED check runs. A floating tag that was
      # compromised to always emit ca3='false' would skip the PG build + tests
      # while the job still reports green — the exact vacuous gate the
      # always-run-job pattern exists to prevent. de90cc6 == v3.0.2.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: changes
        with:
          filters: |
            ca3:
              - 'src/nexus/db/pg_provision.py'
              - 'tests/db/test_pg_provision_ca3_bundle.py'
              - 'tests/db/test_pg_bundle_relocation.py'
              - 'scripts/assert_ca3_ran.py'
              - 'scripts/build_pg_bundle.sh'
              - 'scripts/liquibase_bundle_smoke.sh'
              - '.github/workflows/ci.yml'
              - 'service/src/main/resources/db/changelog/**'
              # A dep bump can change test collection / the Python env the CA-3
              # tests depend on without touching any path above; gate on the
              # lockfile + manifest so such a change re-runs the gate instead of
              # passing vacuously green (substantive-critic S1). Deliberate cost:
              # every dep-bump PR now pays the ~10min PG-from-source build x3 arches
              # — accepted as the price of a non-vacuous gate (substantive-critic O-A).
              - 'uv.lock'
              - 'pyproject.toml'

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        if: steps.changes.outputs.ca3 == 'true'
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Cache uv wheel cache
        if: steps.changes.outputs.ca3 == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ${{ runner.temp }}/setup-uv-cache
          key: uv-${{ runner.os }}-${{ matrix.target.arch }}-3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.target.arch }}-3.12-

      - name: Install project + dev deps
        if: steps.changes.outputs.ca3 == 'true'
        run: uv sync --group dev

      - name: Build complete PG + pgvector from source (Strategy B, glibc 2.28)
        if: steps.changes.outputs.ca3 == 'true'
        run: |
          set -euo pipefail
          # Single source of truth for the build is scripts/build_pg_bundle.sh
          # (RDR-157 P3.1, bead nexus-vwvv5.10) — the CA-3 gate and the P3 bundle
          # artifact build the SAME tree. The bundle is installed at its build
          # prefix and mounted at the SAME path inside the container, so
          # pg_config's compiled-in paths agree with the host for the CA-3 gate.
          # The relocation step below additionally proves an extract to a
          # DIFFERENT dir works (the P3 shippable-bundle contract).
          bundle="$GITHUB_WORKSPACE/bundle"
          mkdir -p "$bundle"
          docker run --rm \
            -e PG_VERSION -e PGVECTOR_VERSION -e BUNDLE_PREFIX="$bundle" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            "$MANYLINUX_IMAGE" /bin/bash -c '
              set -eux
              echo "=== ENTER container ==="; head -2 /etc/os-release; ldd --version | head -1
              bash "'"$GITHUB_WORKSPACE"'/scripts/build_pg_bundle.sh"
            '
          echo "NEXUS_CA3_BUNDLE=$bundle" >> "$GITHUB_ENV"

      - name: Run CA-3 live test (asserts it actually ran, not skipped)
        if: steps.changes.outputs.ca3 == 'true'
        run: |
          set -euo pipefail
          # -o addopts="" clears the repo default `-m 'not integration'` so the
          # integration-marked CA-3 module is collected.
          uv run pytest tests/db/test_pg_provision_ca3_bundle.py \
            -o addopts="" -m integration -q -rs --junit-xml=ca3.xml
          # Non-vacuity gate: platform-conditional tests (GLIBC on mac / minos on
          # linux) skip legitimately; only a bundle-absence skip is a vacuous gate.
          uv run python scripts/assert_ca3_ran.py ca3.xml

      - name: Package bundle + relocation smoke (P3.1, nexus-vwvv5.10)
        # Tar the built tree to a shippable .txz, then EXTRACT it to a dir other
        # than the build prefix and prove the relocated tree still provisions +
        # loads pgvector (closes the relocation concern CA-3 deferred). The
        # glibc-2.28-built binaries run on the ubuntu-latest host (glibc ~2.39,
        # forward-compatible) — that the relocated tree runs OUTSIDE its build
        # container is itself part of the portability proof.
        if: steps.changes.outputs.ca3 == 'true'
        run: |
          set -euo pipefail
          bundle="$GITHUB_WORKSPACE/bundle"
          txz="$RUNNER_TEMP/nexus-pg-${{ matrix.target.arch }}.txz"
          # -C parent + basename preserves the relative bin/ lib/ share/ layout
          # that relocation depends on.
          tar -cJf "$txz" -C "$(dirname "$bundle")" "$(basename "$bundle")"
          # CA-2 ship-alongside regression tripwire (nexus-vwvv5.11): the verdict
          # rests on a small bundle (~5.74 MB compressed). A configure-flag change
          # or new contrib module that doubled it would invalidate the rationale
          # silently. Ceiling is generous head-room, not a tight bound.
          sz=$(wc -c < "$txz")
          echo "bundle .txz size: $sz bytes"
          if [ "$sz" -gt $((10 * 1024 * 1024)) ]; then
            echo "::error::nexus-pg bundle .txz is $sz bytes (> 10 MiB) — CA-2 ship-alongside size assumption breached"
            exit 1
          fi
          reloc="$RUNNER_TEMP/relocated"
          mkdir -p "$reloc"
          tar -xJf "$txz" -C "$reloc"
          export NEXUS_PG_BUNDLE_ROOT="$reloc/$(basename "$bundle")"
          uv run pytest tests/db/test_pg_bundle_relocation.py \
            -o addopts="" -m integration -q -rs --junit-xml=reloc.xml
          # Reuse the CA-3 non-vacuity asserter (keys on the shared
          # "no CA-3 bundle" skip phrase + the CREATE EXTENSION core test).
          uv run python scripts/assert_ca3_ran.py reloc.xml

      - name: Upload bundle artifact (P3.1, consumed by P3.2/P3.4)
        if: steps.changes.outputs.ca3 == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: nexus-pg-${{ matrix.target.arch }}
          path: ${{ runner.temp }}/nexus-pg-${{ matrix.target.arch }}.txz
          retention-days: 7
          if-no-files-found: error

      - name: Liquibase-against-bundle smoke (nexus-ywts8, linux-amd64 only)
        # Applies the service's full SQL changelog to the lean bundle PG, proving
        # the ICU-less / --no-locale build handles the real schema. linux-only:
        # uses `docker --network host` to reach the provisioned PG. One arch is
        # enough — the schema is arch-independent; this validates the lean
        # configure flags, not the platform.
        if: matrix.target.arch == 'linux-amd64' && steps.changes.outputs.ca3 == 'true'
        run: bash scripts/liquibase_bundle_smoke.sh

  ca3-pgvector-bundle-macos:
    # RDR-157 CA-3 for mac-arm64 (bead nexus-0ixqc). Same assemble gate as the
    # linux job, but macOS has no manylinux container: build PG + pgvector
    # NATIVELY on a macos-14 (arm64) runner. pgvector produces vector.dylib; the
    # loader is dyld, so the floor is the Mach-O LC_BUILD_VERSION minos
    # (MACOSX_DEPLOYMENT_TARGET), not GLIBC — asserted by TestMacosFloor.
    name: CA-3 live (PG from source + pgvector, mac-arm64)
    runs-on: macos-14
    timeout-minutes: 30
    env:
      PG_VERSION: "17.5"
      PGVECTOR_VERSION: "v0.8.2"
      # The dyld analog of the glibc floor: build back-deployable to macOS 13
      # (Ventura). Must match MACOS_MIN_FLOOR in the test.
      MACOSX_DEPLOYMENT_TARGET: "13.0"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      # Path-gate the expensive native PG build (same rationale as the linux CA-3
      # job): the job always runs so the required check reports, but the build/test
      # run only when the assemble surface changed.
      # SHA-pinned (not @v3): this filter's `ca3` output gates whether EVERY
      # build/test step in a REQUIRED check runs. A floating tag that was
      # compromised to always emit ca3='false' would skip the PG build + tests
      # while the job still reports green — the exact vacuous gate the
      # always-run-job pattern exists to prevent. de90cc6 == v3.0.2.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: changes
        with:
          filters: |
            ca3:
              - 'src/nexus/db/pg_provision.py'
              - 'tests/db/test_pg_provision_ca3_bundle.py'
              - 'tests/db/test_pg_bundle_relocation.py'
              - 'scripts/assert_ca3_ran.py'
              - 'scripts/build_pg_bundle.sh'
              - 'scripts/liquibase_bundle_smoke.sh'
              - '.github/workflows/ci.yml'
              - 'service/src/main/resources/db/changelog/**'
              # A dep bump can change test collection / the Python env the CA-3
              # tests depend on without touching any path above; gate on the
              # lockfile + manifest so such a change re-runs the gate instead of
              # passing vacuously green (substantive-critic S1). Deliberate cost:
              # every dep-bump PR now pays the ~10min PG-from-source build x3 arches
              # — accepted as the price of a non-vacuous gate (substantive-critic O-A).
              - 'uv.lock'
              - 'pyproject.toml'

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        if: steps.changes.outputs.ca3 == 'true'
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Cache uv wheel cache
        # Mirror the linux CA-3 jobs so a gated mac run reuses wheels instead of
        # re-downloading from scratch (code-review L1).
        if: steps.changes.outputs.ca3 == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ${{ runner.temp }}/setup-uv-cache
          key: uv-${{ runner.os }}-mac-arm64-3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-mac-arm64-3.12-

      - name: Install project + dev deps
        if: steps.changes.outputs.ca3 == 'true'
        run: uv sync --group dev

      - name: Build complete PG + pgvector from source (native, deployment-target 13.0)
        if: steps.changes.outputs.ca3 == 'true'
        env:
          BUNDLE_PREFIX: ${{ github.workspace }}/bundle
        run: |
          set -euo pipefail
          # Single source of truth: scripts/build_pg_bundle.sh (same script the
          # linux CA-3 job runs inside its container). It installs flex/bison via
          # brew, applies MACOSX_DEPLOYMENT_TARGET / -mmacosx-version-min, builds
          # PG + pg_trgm + pgvector, and records the build prefix marker.
          bash scripts/build_pg_bundle.sh
          echo "NEXUS_CA3_BUNDLE=$BUNDLE_PREFIX" >> "$GITHUB_ENV"

      - name: Run CA-3 live test (asserts it actually ran, not skipped)
        if: steps.changes.outputs.ca3 == 'true'
        run: |
          set -euo pipefail
          uv run pytest tests/db/test_pg_provision_ca3_bundle.py \
            -o addopts="" -m integration -q -rs --junit-xml=ca3.xml
          uv run python scripts/assert_ca3_ran.py ca3.xml

      - name: Package bundle + relocation smoke (P3.1, nexus-vwvv5.10)
        # Same relocation proof as the linux job: tar the tree, extract to a dir
        # other than the build prefix, prove the relocated tree provisions +
        # loads pgvector (vector.dylib via dyld) from the new location.
        if: steps.changes.outputs.ca3 == 'true'
        run: |
          set -euo pipefail
          bundle="$GITHUB_WORKSPACE/bundle"
          txz="$RUNNER_TEMP/nexus-pg-mac-arm64.txz"
          tar -cJf "$txz" -C "$(dirname "$bundle")" "$(basename "$bundle")"
          # CA-2 ship-alongside regression tripwire (nexus-vwvv5.11): see the
          # linux job for rationale. Generous 10 MiB ceiling over the ~5.74 MB
          # current bundle.
          sz=$(wc -c < "$txz")
          echo "bundle .txz size: $sz bytes"
          if [ "$sz" -gt $((10 * 1024 * 1024)) ]; then
            echo "::error::nexus-pg bundle .txz is $sz bytes (> 10 MiB) — CA-2 ship-alongside size assumption breached"
            exit 1
          fi
          reloc="$RUNNER_TEMP/relocated"
          mkdir -p "$reloc"
          tar -xJf "$txz" -C "$reloc"
          export NEXUS_PG_BUNDLE_ROOT="$reloc/$(basename "$bundle")"
          uv run pytest tests/db/test_pg_bundle_relocation.py \
            -o addopts="" -m integration -q -rs --junit-xml=reloc.xml
          uv run python scripts/assert_ca3_ran.py reloc.xml

      - name: Upload bundle artifact (P3.1, consumed by P3.2/P3.4)
        if: steps.changes.outputs.ca3 == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: nexus-pg-mac-arm64
          path: ${{ runner.temp }}/nexus-pg-mac-arm64.txz
          retention-days: 7
          if-no-files-found: error

  engine-service-build:
    # S2 (substantive-critic): engine-service-release.yml runs ONLY on
    # workflow_dispatch + engine-service-v* tags, so PR CI never compiles the
    # service. A jOOQ-apply, Liquibase, or GraalVM-reachability regression in
    # service/** can merge to develop unseen until a human cuts a release tag.
    # This is a PR trip-wire: on service/** changes, regenerate jOOQ sources
    # (testcontainers codegen, Docker) and run the SAME native build the release
    # does (-Pnative -Pprebuilt-jooq -DskipTests), minus smoke + publish.
    #
    # NOT a required check — a normal job whose expensive steps are path-gated, so
    # unrelated PRs see a fast no-op. (A required job MUST always run; this one is
    # advisory, so gating the whole job's work via step `if:` is fine.)
    #
    # ADVISORY, NOT BLOCKING (substantive-critic S2, nexus-a5rj8): because it is not
    # a required check, a RED result here does not block merge — it converts "zero
    # build visibility on PRs" into "visible but ignorable". Promoting it to a
    # required check (paying ~40min native build on every service/** PR) is an open
    # decision tracked in nexus-a5rj8.
    name: engine-service native build (PR trip-wire)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: changes
        with:
          filters: |
            svc:
              - 'service/**'
              - '.github/workflows/ci.yml'

      - name: Set up GraalVM 25.0.3
        if: steps.changes.outputs.svc == 'true'
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f  # v1
        with:
          java-version: '25.0.3'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Generate jOOQ sources (testcontainers codegen, Docker)
        if: steps.changes.outputs.svc == 'true'
        working-directory: service
        run: ./mvnw -q generate-sources

      - name: Build native image (-Pnative -Pprebuilt-jooq, no smoke/publish)
        if: steps.changes.outputs.svc == 'true'
        working-directory: service
        # The same build the release performs, minus smoke + publish — catches
        # jOOQ-apply and GraalVM-reachability regressions on the PR instead of at
        # tag-cut. Do NOT `clean`: generate-sources just populated
        # target/generated-sources/jooq, and -Pprebuilt-jooq compiles it in place.
        #
        # nexus-9yrus: -Dnative.image.opt=-Ob (quick-build) on the PR path. Quick-build
        # still runs FULL reachability analysis (the regression class this trip-wire
        # guards) — it only skips the optimization passes — so it cuts the build ~half
        # and lowers peak memory while preserving the gate's purpose. The RELEASE build
        # (engine-service-release.yml) keeps the default -O2 full optimization.
        run: ./mvnw -q -Pnative -Pprebuilt-jooq -DskipTests -Dnative.image.opt=-Ob package

  write-seam-gate:
    # nexus-h29w1 — Behavioural cross-boundary write-seam CI gate (F1 closure).
    #
    # Audit finding F1: no single CI gate exercises BOTH halves of a write-seam
    # diff. The Python suite (ci.yml) deselects integration tests; service-ci.yml
    # fires only on service/** paths — so a Python-only change to
    # http_vector_client.py:upsert_chunks cannot trigger the Java
    # VectorHandler/PgVectorRepository tenant/dedup/quota suite.
    #
    # This job boots the real service JAR (pre-built shaded jar) against a
    # throwaway pgvector/pgvector:pg17 Docker container and feeds >300-record,
    # duplicate-chash, and NUL-bearing inputs through the REAL HttpVectorClient,
    # asserting server-side enforcement: dedup collapse, ON CONFLICT idempotency,
    # and NUL sanitization.  The new value is the Python-client -> real-server
    # WIRE CROSSING — this does NOT duplicate existing in-JVM Java coverage
    # (VectorHandlerEmbeddingModeTest, VectorIntegrationTest,
    # PgVectorRepositoryContractTest).
    #
    # PATH GATE: the job ALWAYS runs (so the required status check always
    # reports), but the expensive build/test steps run only when the write-seam
    # surface changes (Python client OR Java handler).  A diff touching either
    # half triggers this job, closing the gap where neither existing workflow
    # fires.
    #
    # FAIL-NOT-SKIP ON MISSING JAR: NX_REQUIRE_SERVICE_JAR=1 is set so that
    # a missing/stale JAR causes the conftest.py autouse fixture to FAIL (not
    # skip) — the gate cannot pass vacuously on a missing JAR in CI.
    # scripts/assert_write_seam_ran.py then enforces that the load-bearing
    # dedup-collapse test actually ran and passed (no all-skip vacuous green).
    #
    # Part of epic nexus-whh61. Related: nexus-57dh4.
    name: write-seam behavioural gate (nexus-h29w1)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      # SHA-pinned (not @v4): this filter's `seam` output gates whether EVERY
      # expensive step in a REQUIRED check runs. A floating tag compromised to
      # always emit seam='false' would skip the JAR build + test while the job
      # still reports green — the exact vacuous gate this gate exists to prevent.
      # fbd0ab8 == v4.0.1 (same SHA used by the CA-3 jobs above).
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: changes
        with:
          filters: |
            seam:
              - 'src/nexus/db/http_vector_client.py'
              # C1 (nexus-h29w1 critic): VectorHandler lives in http/, not
              # vectors/ — the old vectors/VectorHandler.java entry was a dead
              # reference, so a diff to the real HTTP dispatch layer never fired
              # the gate. AuthFilter does tenant extraction upstream of the
              # write path, so it belongs in the seam too.
              - 'service/src/main/java/dev/nexus/service/http/VectorHandler.java'
              - 'service/src/main/java/dev/nexus/service/http/AuthFilter.java'
              - 'service/src/main/java/dev/nexus/service/vectors/PgVectorRepository.java'
              - 'tests/db/test_write_seam_gate_integration.py'
              - 'scripts/assert_write_seam_ran.py'
              - '.github/workflows/ci.yml'
              # Dep bump can change the Python env or service contract without
              # touching the above paths; gate on lockfile + manifest so such a
              # change re-runs the gate (same rationale as CA-3 jobs above).
              - 'uv.lock'
              - 'pyproject.toml'
              - 'service/pom.xml'

      - name: Set up Java 25 (GraalVM)
        if: steps.changes.outputs.seam == 'true'
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f  # v1
        with:
          java-version: '25.0.3'
          distribution: 'graalvm'
          cache: 'maven'

      - uses: astral-sh/setup-uv@v7
        if: steps.changes.outputs.seam == 'true'
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Cache uv wheel cache
        if: steps.changes.outputs.seam == 'true'
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/setup-uv-cache
          key: uv-${{ runner.os }}-write-seam-3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-write-seam-3.12-

      - name: Cache ChromaDB ONNX model
        if: steps.changes.outputs.seam == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/chroma
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            chromadb-onnx-${{ runner.os }}-

      - name: Install project + dev deps
        if: steps.changes.outputs.seam == 'true'
        run: uv sync --group dev

      - name: Build service JAR (shaded, -DskipTests)
        # Build the JAR that upsert_chunks posts to. Uses the standard Maven
        # shaded package (NOT native) — we need the JVM jar, not a native binary,
        # so the build is ~30s vs ~5m for native.
        if: steps.changes.outputs.seam == 'true'
        working-directory: service
        run: ./mvnw -q package -DskipTests

      - name: Cache bge-768 ONNX model
        # nexus-h29w1: the JAR boots its local ONNX embedder at startup
        # (RDR-160 = bge-768). Without the model the service never finishes
        # booting and never binds its port → the gate timed out ("port not
        # reachable after 90s"). service-ci.yml + engine-release.yml provision
        # this same model; the write-seam gate must too. STABLE key (immutable
        # upstream export) — one cold download, restored thereafter.
        if: steps.changes.outputs.seam == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/nexus/onnx_models/bge-base-en-v1.5
          key: bge-onnx-standard-${{ runner.os }}-v1

      - name: Prime bge-768 ONNX on cache miss
        if: steps.changes.outputs.seam == 'true'
        run: |
          MODEL_DIR="$HOME/.cache/nexus/onnx_models/bge-base-en-v1.5/onnx"
          if [ ! -f "$MODEL_DIR/model.onnx" ]; then
            echo "bge ONNX not in cache; downloading the standard fp32 export (~416MB)."
            mkdir -p "$MODEL_DIR"
            curl -fsSL https://huggingface.co/Xenova/bge-base-en-v1.5/resolve/main/onnx/model.onnx \
              -o "$MODEL_DIR/model.onnx"
            curl -fsSL https://huggingface.co/Xenova/bge-base-en-v1.5/resolve/main/tokenizer.json \
              -o "$MODEL_DIR/tokenizer.json"
            test -f "$MODEL_DIR/model.onnx" || { echo "bge model.onnx missing after download"; exit 1; }
          else
            echo "bge ONNX restored from cache."
          fi

      - name: Run write-seam gate (>300-record, dup-chash, ON CONFLICT, NUL-sanitize)
        if: steps.changes.outputs.seam == 'true'
        env:
          # FAIL (not skip) on missing/stale JAR in CI — the conftest.py autouse
          # _service_jar_freshness fixture checks CI=true (already set by GitHub
          # Actions) and calls pytest.fail() instead of pytest.skip(). Setting
          # NX_REQUIRE_SERVICE_JAR=1 is belt-and-suspenders for local scripted runs
          # that set neither CI nor GITHUB_ACTIONS.
          NX_REQUIRE_SERVICE_JAR: "1"
          CI: "true"
        run: |
          set -euo pipefail
          # -o addopts="" clears the repo default -m 'not integration' so the
          # integration-marked test module is collected (same pattern as CA-3 jobs).
          uv run pytest tests/db/test_write_seam_gate_integration.py \
            -o addopts="" -m integration -q -rs --junit-xml=write-seam.xml
          # Non-vacuity gate: asserts the dedup-collapse test actually ran+passed
          # and no prereq-skip vacuously cleared the run.
          uv run python scripts/assert_write_seam_ran.py write-seam.xml
