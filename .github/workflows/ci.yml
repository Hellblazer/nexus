name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  # Only cancel in-progress runs on PRs (stale pushes). Never cancel main —
  # tag pushes were cancelling version-bump CI, leaving the badge red.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          # nexus-2fyb: cache ~/.cache/uv to avoid cold-downloading torch
          # (~2.8 GB CPU wheel) every CI run. mineru[all] was promoted to
          # a default dep, so without cache the install + sync takes ~10m
          # and risks exceeding the job timeout. Key on uv.lock.
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache ChromaDB ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chromadb-onnx-${{ runner.os }}

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v
