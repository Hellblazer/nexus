name: Engine Service Native Release

# RDR-157 P2 / beads nexus-vwvv5.6 + nexus-6o0bc.
#
# Publishes the native `nexus-service` binary (the engine storage server) as a
# consumable artifact so conexus `deploy/engine` can build its runtime image
# FROM the published binary instead of throwaway-cloning + JAR/jlink. This is
# the RDR-157 "cloud habitat" variant: the same native binary, run with no
# embedded PG — it connects to a managed Postgres via NX_DB_URL and skips
# pg_provision.
#
# CHANNEL — deliberately separate from the `conexus` PyPI release (`vX.Y.Z`
# tags / release.yml). The engine-service binary is a DIFFERENT artifact from
# the conexus package, so an `engine-service-v*` tag here does NOT trip the
# develop release boundary (RDR-155 P4a) and publishes nothing to PyPI.
#
#   - workflow_dispatch : build + smoke + upload an Actions artifact only
#                         (reversible dev path — download it to smoke conexus
#                         locally / in the cloud, no GitHub Release created).
#   - push tag engine-service-v*
#                       : build + smoke + create a GitHub Release and attach the
#                         linux-amd64 native binary + its sha256 (what conexus
#                         pins and pulls).
#
# Per-platform matrix (nexus-vwvv5.6): linux-amd64 + linux-arm64 + mac-arm64
# native binaries on their own runners (native-image does not cross-compile).
# The jOOQ decouple (nexus-f6j31) pre-generates sources on a Docker-capable linux
# runner and passes them as an artifact, so mac-arm64 can BUILD without Docker.
# mac-arm64 is build+publish but UNSMOKED: native-smoke.sh needs Docker (throwaway
# pgvector) which GH macOS lacks, so its runtime correctness rests on the
# mac-arm64 CA-3 gate + the lp2qo native-serving spike, not a per-build smoke.
# conexus pins/pulls the linux-amd64 asset; local-distro users grab their arch.

on:
  workflow_dispatch:
  push:
    tags:
      - 'engine-service-v*'

permissions:
  contents: write  # create the GitHub Release + upload assets on tag push

concurrency:
  group: engine-service-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Generate jOOQ sources ONCE on a Docker-capable runner (testcontainers codegen
  # needs Docker), upload them. The per-platform native builds then consume the
  # artifact with -Pprebuilt-jooq and need no Docker — which unblocks mac-arm64
  # (GH macOS runners have no Docker). nexus-f6j31.
  jooq-codegen:
    name: jOOQ codegen (linux, Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up GraalVM 25.0.3
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f
        with:
          java-version: '25.0.3'
          distribution: 'graalvm'
          cache: 'maven'
      - name: Run testcontainers jOOQ codegen
        working-directory: service
        # generate-sources triggers testcontainers-jooq-codegen (boots pgvector,
        # applies the master changelog, generates into target/generated-sources/jooq).
        run: ./mvnw -q generate-sources
      - name: Upload generated jOOQ sources
        uses: actions/upload-artifact@v4
        with:
          name: jooq-sources
          path: service/target/generated-sources/jooq
          if-no-files-found: error
          retention-days: 3

  build-publish:
    name: Build + smoke + publish native nexus-service (${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.runner }}
    needs: jooq-codegen
    # Native-image build (~2-3m analysis + image) + native smoke (linux only).
    # No jOOQ codegen here — sources come from the jooq-codegen artifact, so no
    # Docker is needed to BUILD (mac-arm64 can build). 40m covers a cold runner.
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        target:
          - { arch: linux-amd64, runner: ubuntu-latest,    smoke: true }
          - { arch: linux-arm64, runner: ubuntu-24.04-arm, smoke: true }
          # mac-arm64: build + publish, but UNSMOKED. native-smoke.sh needs Docker
          # (throwaway pgvector) which GH macOS lacks; macOS runtime correctness is
          # covered by the mac-arm64 CA-3 gate + the lp2qo native-serving spike.
          - { arch: mac-arm64,   runner: macos-14,          smoke: false }
    env:
      ASSET: nexus-service-${{ matrix.target.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 25.0.3
        # SHA-pinned (not @v1): this is a PUBLISH path that creates a GitHub
        # Release, so a floating tag is a supply-chain hole. bef4b0e == v1.
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f
        with:
          # >= 25.0.2 REQUIRED: the bundled jOOQ / liquibase reachability metadata
          # use GraalVM's unified reachability-metadata schema (nexus-lp2qo).
          java-version: '25.0.3'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Cache ChromaDB ONNX model
        # The service constructs the ONNX embedder at startup (NX_EMBED_MODE=onnx),
        # loading all-MiniLM-L6-v2 from ~/.cache/chroma — the native smoke needs it.
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chromadb-onnx-${{ runner.os }}-${{ matrix.target.arch }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            chromadb-onnx-${{ runner.os }}-${{ matrix.target.arch }}-

      - name: Prime ONNX model on cache miss
        run: |
          MODEL_DIR="$HOME/.cache/chroma/onnx_models/all-MiniLM-L6-v2"
          if [ ! -f "$MODEL_DIR/onnx/model.onnx" ]; then
            echo "ONNX model not in cache; downloading."
            mkdir -p "$MODEL_DIR"
            curl -fsSL https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz \
              -o /tmp/onnx.tar.gz
            tar -xzf /tmp/onnx.tar.gz -C "$MODEL_DIR"
            test -f "$MODEL_DIR/onnx/model.onnx" || { echo "model.onnx missing after extract"; exit 1; }
          else
            echo "ONNX model restored from cache."
          fi

      - name: Resolve engine-service version
        id: ver
        # On a tag push, the published version is the tag minus the
        # 'engine-service-v' prefix. On workflow_dispatch (dev/smoke) there is no
        # release version, so keep the pom's SNAPSHOT. The version must be stamped
        # into the binary so its /version endpoint (VersionHandler reads
        # pom.properties) does not report 1.0-SNAPSHOT under a real release tag —
        # nx clients negotiate schema skew off /version (nexus-pebfx.4).
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" == refs/tags/engine-service-v* ]]; then
            echo "version=${ref#engine-service-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download pre-generated jOOQ sources
        # From the jooq-codegen job — compiled by -Pprebuilt-jooq below. No Docker
        # needed to build, which is what lets mac-arm64 build here.
        uses: actions/download-artifact@v4
        with:
          name: jooq-sources
          path: service/target/generated-sources/jooq

      - name: Stamp release version into the pom (tag push only)
        if: steps.ver.outputs.version != ''
        working-directory: service
        run: ./mvnw -q versions:set -DnewVersion="${{ steps.ver.outputs.version }}" -DgenerateBackupPoms=false

      - name: Build native image (-Pnative -Pprebuilt-jooq)
        working-directory: service
        # -Pprebuilt-jooq unbinds the testcontainers codegen and compiles the
        # downloaded sources → no Docker needed (mac-arm64 builds here).
        # Do NOT `clean`: it would wipe the downloaded target/generated-sources/jooq.
        run: ./mvnw -q -Pnative -Pprebuilt-jooq -DskipTests package

      - name: Native smoke test (boot against throwaway pgvector)
        if: matrix.target.smoke
        working-directory: service
        # Asserts liquibase migration + jOOQ INSERT/SELECT/FTS return 200 against
        # a real Postgres — the cloud runtime path. Don't publish a broken binary.
        # linux only: needs Docker, which GH macOS lacks (mac is build-only).
        run: ./native-smoke.sh

      - name: Stage artifact + sha256
        id: stage
        run: |
          set -euo pipefail
          src="service/target/nexus-service"
          test -x "$src" || { echo "native binary missing at $src"; ls -la service/target; exit 1; }
          # Size floor: a native image is tens of MB. A truncated/empty build that
          # still had its exec bit set would otherwise pass the -x check.
          # wc -c (not stat -c%s) for macOS/BSD portability.
          sz=$(wc -c < "$src")
          test "$sz" -gt 20000000 || { echo "native binary suspiciously small ($sz bytes)"; exit 1; }
          mkdir -p dist
          cp "$src" "dist/$ASSET"
          # sha256sum on linux, shasum -a 256 on macOS (identical file format).
          ( cd dist && { command -v sha256sum >/dev/null && sha256sum "$ASSET" || shasum -a 256 "$ASSET"; } > "$ASSET.sha256" )
          ls -la dist
          file "dist/$ASSET" || true

      - name: Assert binary ABI floor (code-review M1)
        # The release native image is built on ubuntu-latest (~glibc 2.39) — a
        # HIGHER floor than the CA-3 bundle gate (manylinux 2.28). Enforcement was
        # previously deferred entirely to conexus deploy/engine/build-image.sh, so a
        # runner bump that pushed the floor ABOVE the consumer base would surface
        # only at image-build time. Assert it here too: linux max-required GLIBC
        # must be <= the conexus runtime base (debian:trixie-slim = 2.41). For mac,
        # report the Mach-O minos (informational; no Docker smoke covers it).
        run: |
          set -euo pipefail
          asset="dist/$ASSET"
          case "${{ matrix.target.arch }}" in
            linux-*)
              # Max GLIBC_x.y.z token referenced by the binary's dynamic symbols.
              maxglibc=$(objdump -T "$asset" 2>/dev/null \
                | grep -oE 'GLIBC_[0-9]+\.[0-9]+(\.[0-9]+)?' \
                | sed 's/GLIBC_//' | sort -V | tail -1)
              echo "max required GLIBC: ${maxglibc:-none}"
              ceiling="2.41"  # conexus runtime base (debian:trixie-slim)
              if [ -n "$maxglibc" ] && [ "$(printf '%s\n%s\n' "$maxglibc" "$ceiling" | sort -V | tail -1)" != "$ceiling" ]; then
                echo "FAIL: binary requires GLIBC $maxglibc > consumer base $ceiling" >&2
                exit 1
              fi
              ;;
            mac-*)
              otool -l "$asset" | awk '/LC_BUILD_VERSION/{f=1} f&&/minos/{print "Mach-O "$0; f=0}' || true
              ;;
          esac

      - name: Upload Actions artifact (always — dev smoke / non-tag path)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: dist/*
          retention-days: 14
          if-no-files-found: error

      - name: Publish GitHub Release (engine-service-v* tag only)
        if: startsWith(github.ref, 'refs/tags/engine-service-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # printf (not a heredoc): immune to YAML run-block indentation.
          printf '%s\n' \
            "Native nexus-service binaries for the RDR-157 cloud + local habitats:" \
            "run with no embedded PG, pointed at a managed Postgres via NX_DB_URL" \
            "(skips pg_provision). Consumed by conexus deploy/engine (build the" \
            "runtime image FROM the linux-amd64 binary). Per-platform assets +" \
            "sha256 attached: nexus-service-linux-amd64, nexus-service-linux-arm64," \
            "nexus-service-mac-arm64." \
            "" \
            "NOTE: the mac-arm64 binary is UNSMOKED (GH macOS runners have no Docker" \
            "for native-smoke.sh). Its runtime correctness rests on the mac-arm64" \
            "CA-3 gate + the lp2qo native-serving spike, not a per-build smoke —" \
            "treat it as experimental. The linux binaries ARE smoke-tested." \
            "" \
            "glibc floor: linux binaries built on ubuntu-latest (~2.39). The runtime" \
            "base must have glibc >= that (conexus uses debian:trixie-slim = 2.41);" \
            "deploy/engine/build-image.sh enforces this via objdump." \
            "" \
            "ONNX model NOT bundled — the binary loads all-MiniLM-L6-v2 from the" \
            "filesystem at runtime. Before building the runtime image, stage it:" \
            "  mkdir -p ~/.cache/chroma/onnx_models/all-MiniLM-L6-v2/onnx" \
            "  curl -fsSL https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz | tar -xz -C ~/.cache/chroma/onnx_models/all-MiniLM-L6-v2" \
            "" \
            "Provenance: sha256 only for now; cosign/Sigstore signing tracked for N+1." \
            > notes.md
          # Matrix-safe: create the release once (whichever arch job wins), then
          # each job uploads its OWN arch assets (--clobber for re-runs). Use
          # view-then-create rather than `create ... 2>/dev/null || true`: the old
          # idiom swallowed auth/network/rate-limit failures identically to the
          # expected 'already exists', then fell through to `upload` which failed
          # with a confusing 'release not found' (code-review H1).
          if ! gh release view "$tag" >/dev/null 2>&1; then
            # Tolerate ONLY the matrix race (another arch job created it between the
            # view and this create); surface auth/network/anything else.
            if ! gh release create "$tag" --title "nexus-service (native) ${tag}" \
                   --notes-file notes.md 2>create_err.txt; then
              grep -qi "already exists" create_err.txt \
                || { echo "release create failed:" >&2; cat create_err.txt >&2; exit 1; }
            fi
          fi
          gh release upload "$tag" --clobber "dist/$ASSET" "dist/$ASSET.sha256"
