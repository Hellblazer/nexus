name: Integration tests

# nexus-2ivn: nightly integration suite. Pulled out of the per-PR
# core suite because the PDF + ML tests run CPU-only Docling / MinerU
# inference (no GPU on GHA's ubuntu-latest) at 1-3 s per test, paying
# the worst-case ML tax on every push without providing per-PR
# regression value worth the wall-time.
#
# Triggers:
#   - schedule (daily at 04:00 UTC)
#   - manual workflow_dispatch (run on demand)
#
# Run locally with: ``uv run pytest -m integration``

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  integration:
    name: pytest -m integration (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - name: Cache uv wheel cache
        uses: actions/cache@v4
        with:
          # nexus-2ivn: setup-uv@v5 sets UV_CACHE_DIR to
          # ${{ runner.temp }}/setup-uv-cache regardless of
          # enable-cache; cache that path so the wheel cache
          # actually rehydrates between runs.
          path: ${{ runner.temp }}/setup-uv-cache
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Cache ChromaDB ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Run integration tests
        run: uv run pytest -m integration -v --tb=short
