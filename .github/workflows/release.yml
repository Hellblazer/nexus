name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # 2026-07-06 CI-cost pass: the pytest matrix that used to run here was
  # removed. A v* tag always points at a main merge commit whose identical
  # tree passed the release PR's required checks (pytest 3.12 + 3.13)
  # minutes before the tag was pushed — re-running ~40 min of ubuntu per
  # tag re-tested the same tree a fourth time and made publish hostage to
  # the nexus-9eaz GHA-flake family. The publish job below still verifies
  # tag == pyproject version before building.
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi-release
    permissions:
      id-token: write   # required for OIDC trusted publisher
      contents: write   # required to create GitHub release

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          python-version: "3.12"
          # nexus-2ivn: see ci.yml. Bundled enable-cache caches metadata
          # only; explicit actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5 step below targets the
          # wheel-cache directory setup-uv actually uses.
          enable-cache: false

      - name: Cache uv wheel cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ${{ runner.temp }}/setup-uv-cache
          key: uv-${{ runner.os }}-3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-3.12-

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip leading 'v'
          PKG=$(python3 -c "
          import re
          m = re.search(r'^version\s*=\s*\"(.+?)\"', open('pyproject.toml').read(), re.M)
          print(m.group(1) if m else '')
          ")
          if [ "$TAG" != "$PKG" ]; then
            echo "ERROR: tag '$TAG' does not match pyproject.toml version '$PKG'"
            exit 1
          fi
          echo "Version check passed: $PKG"

      - name: Verify mcpb/manifest.json version matches tag (RDR-126 nexus-2yajx)
        run: |
          # The Claude Desktop .mcpb bundle is a separate version-drift
          # surface: its manifest.json carries its own version field. The
          # pytest parity test catches drift on the release SHA, but the
          # tag is applied after merge — this release-time guard fails the
          # publish loud if the bundle was not bumped in lock-step.
          TAG="${GITHUB_REF_NAME#v}"
          MCPB=$(python3 -c "import json; print(json.load(open('mcpb/manifest.json')).get('version',''))")
          if [ "$TAG" != "$MCPB" ]; then
            echo "ERROR: tag '$TAG' does not match mcpb/manifest.json version '$MCPB'"
            exit 1
          fi
          echo "mcpb version check passed: $MCPB"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python3 - <<EOF > /tmp/release_notes.md
          import re, sys
          tag = "$TAG"
          text = open("CHANGELOG.md").read()
          # Match the section for this version (between its heading and the next ## heading)
          pattern = rf'## \[{re.escape(tag)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(1).strip() if m else f"Release {tag}")
          EOF
          echo "Release notes:"
          cat /tmp/release_notes.md

      - name: Install project
        run: uv sync

      - name: Verify cloud engine meets required floor (nexus-b6qlf)
        # Mechanically enforces the release checklist's "Engine-freshness
        # gate" step, which was previously prose-only and got skipped in
        # practice: the cloud engine sat at engine-service-v0.1.17 for 9+
        # days across releases while REQUIRED_ENGINE_VERSION moved to
        # v0.1.34. Requires network egress to the live managed service
        # (api.conexus-nexus.com, unauthenticated GET /version, no secrets
        # needed) -- a transient network blip could block a release
        # momentarily; accepted tradeoff vs. the alternative of silent
        # engine drift.
        run: uv run python scripts/check_engine_release_floor.py

      - name: Build wheel and sdist
        run: uv build --sdist --wheel

      - name: Pack .mcpb Desktop Extension (RDR-126 nexus-bsjro)
        run: |
          # The Claude Desktop .mcpb bundle is a tiny artifact (~1-2 KB)
          # carrying manifest.json + pyproject.toml + src/server.py.
          # Users on Claude Desktop chat double-click it to install.
          # `npx @anthropic-ai/mcpb pack` zips the mcpb/ directory and
          # validates manifest.json against the v0.4 schema.
          npm install -g @anthropic-ai/mcpb
          cd mcpb
          mcpb pack . conexus.mcpb
          ls -la conexus.mcpb
          mkdir -p ../mcpb-dist && mv conexus.mcpb ../mcpb-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        # No api-token needed — uses OIDC trusted publisher

      - name: Create GitHub Release
        # Pinned to v2.6.2 SHA after the floating @v2 tag was implicated
        # in a "Bad credentials" failure during the 4.34.4 publish (run
        # 26327424584, 2026-05-23). PyPI publish succeeded; only the GH
        # release sub-step failed and was created manually. Pinning to a
        # full-length SHA prevents silent action upgrades from re-introducing
        # the issue. Bump deliberately when validating a newer v2.x.
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          body_path: /tmp/release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            mcpb-dist/conexus.mcpb
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
