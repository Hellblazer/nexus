name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Hanging-test ceiling. Without this, an unreaped multiprocessing
    # subprocess (fork-with-threads deadlock) would stall the release
    # job indefinitely, blocking PyPI publish until manually cancelled.
    # v4.18.0 tag-push hit it: pytest 3.13 ran 36+ min before manual
    # cancel. 4.32.1 hit a different boundary — Python 3.12 ran 15m22s
    # while 3.13 ran 11m33s. The suite grew under RDR-109 (cross-
    # encoder substrate; lazy ONNX-runtime imports). Bumped to 20m to
    # match ``ci.yml`` while still catching genuine hangs.
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          # nexus-2ivn: see ci.yml. Bundled enable-cache caches metadata
          # only; the wheel cache lives at ${{ runner.temp }}/setup-uv-
          # cache and needs an explicit actions/cache@v4 step.
          enable-cache: false

      - name: Cache uv wheel cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/setup-uv-cache
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Cache ChromaDB ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          # nexus-8g79.33: same lockfile-bound key as ci.yml.
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi-release
    permissions:
      id-token: write   # required for OIDC trusted publisher
      contents: write   # required to create GitHub release

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          # nexus-2ivn: see ci.yml. Bundled enable-cache caches metadata
          # only; explicit actions/cache@v4 step below targets the
          # wheel-cache directory setup-uv actually uses.
          enable-cache: false

      - name: Cache uv wheel cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/setup-uv-cache
          key: uv-${{ runner.os }}-3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-3.12-

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip leading 'v'
          PKG=$(python3 -c "
          import re
          m = re.search(r'^version\s*=\s*\"(.+?)\"', open('pyproject.toml').read(), re.M)
          print(m.group(1) if m else '')
          ")
          if [ "$TAG" != "$PKG" ]; then
            echo "ERROR: tag '$TAG' does not match pyproject.toml version '$PKG'"
            exit 1
          fi
          echo "Version check passed: $PKG"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python3 - <<EOF > /tmp/release_notes.md
          import re, sys
          tag = "$TAG"
          text = open("CHANGELOG.md").read()
          # Match the section for this version (between its heading and the next ## heading)
          pattern = rf'## \[{re.escape(tag)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(1).strip() if m else f"Release {tag}")
          EOF
          echo "Release notes:"
          cat /tmp/release_notes.md

      - name: Install project
        run: uv sync

      - name: Build wheel and sdist
        run: uv build --sdist --wheel

      - name: Pack .mcpb Desktop Extension (RDR-126 nexus-bsjro)
        run: |
          # The Claude Desktop .mcpb bundle is a tiny artifact (~1-2 KB)
          # carrying manifest.json + pyproject.toml + src/server.py.
          # Users on Claude Desktop chat double-click it to install.
          # `npx @anthropic-ai/mcpb pack` zips the mcpb/ directory and
          # validates manifest.json against the v0.4 schema.
          npm install -g @anthropic-ai/mcpb
          cd mcpb
          mcpb pack . conexus.mcpb
          ls -la conexus.mcpb
          mkdir -p ../mcpb-dist && mv conexus.mcpb ../mcpb-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No api-token needed — uses OIDC trusted publisher

      - name: Create GitHub Release
        # Pinned to v2.6.2 SHA after the floating @v2 tag was implicated
        # in a "Bad credentials" failure during the 4.34.4 publish (run
        # 26327424584, 2026-05-23). PyPI publish succeeded; only the GH
        # release sub-step failed and was created manually. Pinning to a
        # full-length SHA prevents silent action upgrades from re-introducing
        # the issue. Bump deliberately when validating a newer v2.x.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          body_path: /tmp/release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            mcpb-dist/conexus.mcpb
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
