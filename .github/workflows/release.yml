name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Match the CI workflow's 15-min ceiling. Without this, a hanging
    # test (e.g. an unreaped multiprocessing subprocess from a fork-with-
    # threads deadlock) would stall the release job indefinitely, blocking
    # PyPI publish until manually cancelled. Hit during the v4.18.0
    # tag-push: pytest 3.13 ran 36+ min before manual cancel.
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache ChromaDB ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chromadb-onnx-${{ runner.os }}

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install project + dev deps
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi-release
    permissions:
      id-token: write   # required for OIDC trusted publisher
      contents: write   # required to create GitHub release

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip leading 'v'
          PKG=$(python3 -c "
          import re
          m = re.search(r'^version\s*=\s*\"(.+?)\"', open('pyproject.toml').read(), re.M)
          print(m.group(1) if m else '')
          ")
          if [ "$TAG" != "$PKG" ]; then
            echo "ERROR: tag '$TAG' does not match pyproject.toml version '$PKG'"
            exit 1
          fi
          echo "Version check passed: $PKG"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python3 - <<EOF > /tmp/release_notes.md
          import re, sys
          tag = "$TAG"
          text = open("CHANGELOG.md").read()
          # Match the section for this version (between its heading and the next ## heading)
          pattern = rf'## \[{re.escape(tag)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(1).strip() if m else f"Release {tag}")
          EOF
          echo "Release notes:"
          cat /tmp/release_notes.md

      - name: Install project
        run: uv sync

      - name: Build wheel and sdist
        run: uv build --sdist --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No api-token needed — uses OIDC trusted publisher

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
