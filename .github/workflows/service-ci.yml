name: Service CI

# Triggers only when the Java service module changes.
# Kept separate from ci.yml (Python suite) so neither blocks the other.
on:
  push:
    branches: [main, develop]
    paths:
      - 'service/**'
      - '.github/workflows/service-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'service/**'
      - '.github/workflows/service-ci.yml'

concurrency:
  group: service-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  java-test-and-drift-guard:
    name: Java tests + jOOQ codegen drift guard
    runs-on: ubuntu-latest
    # Testcontainers pulls pgvector/pgvector:pg17 on first run (~180 MB);
    # subsequent runs use the Docker layer cache.  30m covers a cold
    # runner: Maven cache miss + Docker image pull + suite (~8s locally).
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          # Cache Maven local repo across runs; bust when pom.xml changes.
          cache: 'maven'

      - name: Cache ChromaDB ONNX model
        # EmbedParityTest constructs OnnxEmbedder, which loads the
        # all-MiniLM-L6-v2 model from ~/.cache/chroma. Mirror the SAME
        # cache key as ci.yml (the Python suite) so this Java-only runner
        # restores the model the Python workflow already downloaded.
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            chromadb-onnx-${{ runner.os }}-

      - name: Prime ONNX model on cache miss
        # Self-sufficiency: if the cache was empty (e.g. ci.yml has not run
        # on this branch yet), fetch the model directly. chromadb downloads
        # this exact tarball on first use; mirror its layout under
        # ~/.cache/chroma/onnx_models/all-MiniLM-L6-v2/onnx/.
        run: |
          MODEL_DIR="$HOME/.cache/chroma/onnx_models/all-MiniLM-L6-v2"
          if [ ! -f "$MODEL_DIR/onnx/model.onnx" ]; then
            echo "ONNX model not in cache; downloading."
            mkdir -p "$MODEL_DIR"
            curl -fsSL https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz \
              -o /tmp/onnx.tar.gz
            tar -xzf /tmp/onnx.tar.gz -C "$MODEL_DIR"
            test -f "$MODEL_DIR/onnx/model.onnx" || { echo "model.onnx missing after extract"; exit 1; }
          else
            echo "ONNX model restored from cache."
          fi

      - name: Run Java test suite
        working-directory: service
        run: mvn -q test

      # Drift guard: regenerate jOOQ sources from the changelog and
      # fail if the committed sources in src/main/generated/jooq/ differ.
      # This catches schema changes that were not followed by a regen+commit.
      # Mechanism: -Pcodegen runs JooqCodegenBootstrap (spins up a pgvector
      # container, applies Liquibase, generates to the committed output dir), then
      # `git diff --exit-code` fails CI on any unstaged diff.
      - name: jOOQ codegen drift guard
        working-directory: service
        run: |
          mvn -Pcodegen process-test-classes -q
          # NOTE: this step runs with working-directory: service, so the diff
          # path is repo-relative-to-service ("src/main/generated/"), NOT
          # "service/src/main/generated/" (which would resolve to
          # service/service/... and fail with "ambiguous argument /
          # unknown revision or path"). The `--` separates path from revision.
          git diff --exit-code -- src/main/generated/ || {
            echo "DRIFT DETECTED: committed jOOQ sources are stale vs. the current changelog."
            echo "Re-run: mvn -Pcodegen process-test-classes && git add service/src/main/generated/ && git commit"
            echo ""
            git diff --stat -- src/main/generated/
            exit 1
          }
