name: Service CI

# Triggers only when the Java service module changes.
# Kept separate from ci.yml (Python suite) so neither blocks the other.
on:
  push:
    branches: [main, develop]
    paths:
      - 'service/**'
      - '.github/workflows/service-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'service/**'
      - '.github/workflows/service-ci.yml'

concurrency:
  group: service-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  java-test-and-drift-guard:
    name: Java tests + jOOQ codegen drift guard
    runs-on: ubuntu-latest
    # Testcontainers pulls pgvector/pgvector:pg17 on first run (~180 MB);
    # subsequent runs use the Docker layer cache.  30m covers a cold
    # runner: Maven cache miss + Docker image pull + suite (~8s locally).
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # SchemaUpgradeRehearsalIntegrationTest (nexus-4m6i0.6) needs an old
          # engine-service tag's changelog tree via `git archive <tag>`. Default
          # checkout (fetch-depth 1) fetches no tags at all; fetch-tags fetches
          # every tag's commit+tree cheaply (no full history), so the rehearsal
          # never falls back to its loud-skip path in CI.
          fetch-tags: true

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f  # v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          # Cache Maven local repo across runs; bust when pom.xml changes.
          cache: 'maven'

      - name: Cache ChromaDB ONNX model
        # EmbedParityTest constructs OnnxEmbedder, which loads the
        # all-MiniLM-L6-v2 model from ~/.cache/chroma. Mirror the SAME
        # cache key as ci.yml (the Python suite) so this Java-only runner
        # restores the model the Python workflow already downloaded.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cache/chroma
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            chromadb-onnx-${{ runner.os }}-

      - name: Prime ONNX model on cache miss
        # Self-sufficiency: if the cache was empty (e.g. ci.yml has not run
        # on this branch yet), fetch the model directly. chromadb downloads
        # this exact tarball on first use; mirror its layout under
        # ~/.cache/chroma/onnx_models/all-MiniLM-L6-v2/onnx/.
        run: |
          MODEL_DIR="$HOME/.cache/chroma/onnx_models/all-MiniLM-L6-v2"
          if [ ! -f "$MODEL_DIR/onnx/model.onnx" ]; then
            echo "ONNX model not in cache; downloading."
            mkdir -p "$MODEL_DIR"
            curl -fsSL https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz \
              -o /tmp/onnx.tar.gz
            tar -xzf /tmp/onnx.tar.gz -C "$MODEL_DIR"
            test -f "$MODEL_DIR/onnx/model.onnx" || { echo "model.onnx missing after extract"; exit 1; }
          else
            echo "ONNX model restored from cache."
          fi

      - name: Prime bge-768 ONNX (cache or self-hosted asset)
        # RDR-160: Bge768ParityTest (the parity go/no-go gate) loads the STANDARD
        # fp32 bge ONNX; priming it here makes the gate RUN on CI instead of
        # skipping. Centralised in .github/actions/prime-bge-onnx (self-hosted
        # release asset, no HuggingFace 429 dependency).
        uses: ./.github/actions/prime-bge-onnx

      # jOOQ codegen now runs INSIDE the build (bead nexus-9qvam): the
      # testcontainers-jooq-codegen-maven-plugin generates into
      # target/generated-sources/jooq at the generate-sources phase from the
      # Liquibase changelog (sole schema authority), so generated sources are
      # never committed and drift is impossible by construction — a codegen
      # failure fails this step. The former -Pcodegen profile + committed
      # src/main/generated/ tree + git-diff drift guard are retired.
      #
      # NOTE: the job id/display name still say "drift guard" — they are kept
      # verbatim because the PR status-check name is referenced by branch
      # protection; renaming would strand required checks.
      - name: Run Java test suite
        working-directory: service
        run: ./mvnw -q test

      # nexus-c3rer: the old-to-HEAD upgrade rehearsal skips (JUnit
      # Assumptions.abort) when the old engine tag is unavailable — a skip
      # that Maven treats as success and the Actions UI shows green. This
      # step fails the job if the rehearsal was skipped or never executed,
      # so a fetch-tags regression can't silently retire the gate
      # (gates-scripted-not-ambient; mirrors ci.yml's assert_ca3_ran.py).
      - name: Assert upgrade rehearsal actually ran (not skipped)
        run: |
          python3 scripts/assert_rehearsal_ran.py \
            service/target/surefire-reports/TEST-dev.nexus.service.SchemaUpgradeRehearsalIntegrationTest.xml

  # 2026-07-06 CI-cost pass: the native-image-build-and-smoke job that lived
  # here was removed — every service/** push was building the native image
  # TWICE (this job's full -O2 build + pgvector smoke, PLUS ci.yml's
  # engine-service-build -Ob reachability trip-wire on the same events). The
  # reachability-regression class is covered by ci.yml's trip-wire on every
  # push/PR; the full-optimization build + boot smoke still runs where the
  # artifact is actually produced (engine-service-release.yml, on every
  # engine-service-v* tag, before anything is published or deployed).
