name: Service CI

# Triggers only when the Java service module changes.
# Kept separate from ci.yml (Python suite) so neither blocks the other.
on:
  push:
    branches: [main, develop]
    paths:
      - 'service/**'
      - '.github/workflows/service-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'service/**'
      - '.github/workflows/service-ci.yml'

concurrency:
  group: service-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  java-test-and-drift-guard:
    name: Java tests + jOOQ codegen drift guard
    runs-on: ubuntu-latest
    # Testcontainers pulls pgvector/pgvector:pg17 on first run (~180 MB);
    # subsequent runs use the Docker layer cache.  30m covers a cold
    # runner: Maven cache miss + Docker image pull + suite (~8s locally).
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          # Cache Maven local repo across runs; bust when pom.xml changes.
          cache: 'maven'

      - name: Cache ChromaDB ONNX model
        # EmbedParityTest constructs OnnxEmbedder, which loads the
        # all-MiniLM-L6-v2 model from ~/.cache/chroma. Mirror the SAME
        # cache key as ci.yml (the Python suite) so this Java-only runner
        # restores the model the Python workflow already downloaded.
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            chromadb-onnx-${{ runner.os }}-

      - name: Prime ONNX model on cache miss
        # Self-sufficiency: if the cache was empty (e.g. ci.yml has not run
        # on this branch yet), fetch the model directly. chromadb downloads
        # this exact tarball on first use; mirror its layout under
        # ~/.cache/chroma/onnx_models/all-MiniLM-L6-v2/onnx/.
        run: |
          MODEL_DIR="$HOME/.cache/chroma/onnx_models/all-MiniLM-L6-v2"
          if [ ! -f "$MODEL_DIR/onnx/model.onnx" ]; then
            echo "ONNX model not in cache; downloading."
            mkdir -p "$MODEL_DIR"
            curl -fsSL https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz \
              -o /tmp/onnx.tar.gz
            tar -xzf /tmp/onnx.tar.gz -C "$MODEL_DIR"
            test -f "$MODEL_DIR/onnx/model.onnx" || { echo "model.onnx missing after extract"; exit 1; }
          else
            echo "ONNX model restored from cache."
          fi

      # jOOQ codegen now runs INSIDE the build (bead nexus-9qvam): the
      # testcontainers-jooq-codegen-maven-plugin generates into
      # target/generated-sources/jooq at the generate-sources phase from the
      # Liquibase changelog (sole schema authority), so generated sources are
      # never committed and drift is impossible by construction — a codegen
      # failure fails this step. The former -Pcodegen profile + committed
      # src/main/generated/ tree + git-diff drift guard are retired.
      #
      # NOTE: the job id/display name still say "drift guard" — they are kept
      # verbatim because the PR status-check name is referenced by branch
      # protection; renaming would strand required checks.
      - name: Run Java test suite
        working-directory: service
        run: ./mvnw -q test

  native-image-build-and-smoke:
    name: Native image build + smoke (nexus-lp2qo)
    runs-on: ubuntu-latest
    # Native-image build (~2-3m analysis + image) + jOOQ codegen testcontainer
    # + pgvector pull + native smoke. 40m covers a cold runner.
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 25.0.3
        uses: graalvm/setup-graalvm@v1
        with:
          # >= 25.0.2 REQUIRED: the bundled jOOQ 3.20.0 / liquibase reachability
          # metadata use GraalVM's unified reachability-metadata SCHEMA, which
          # 25.0.1 rejects ("installation does not provide reachability-metadata
          # schema"). Pinned for native-build determinism (nexus-lp2qo).
          java-version: '25.0.3'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Cache ChromaDB ONNX model
        # The service initializes the ONNX embedder at startup (NX_EMBED_MODE=onnx),
        # loading all-MiniLM-L6-v2 from ~/.cache/chroma — the native smoke needs it.
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chromadb-onnx-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            chromadb-onnx-${{ runner.os }}-

      - name: Prime ONNX model on cache miss
        run: |
          MODEL_DIR="$HOME/.cache/chroma/onnx_models/all-MiniLM-L6-v2"
          if [ ! -f "$MODEL_DIR/onnx/model.onnx" ]; then
            mkdir -p "$MODEL_DIR"
            curl -fsSL https://chroma-onnx-models.s3.amazonaws.com/all-MiniLM-L6-v2/onnx.tar.gz \
              -o /tmp/onnx.tar.gz
            tar -xzf /tmp/onnx.tar.gz -C "$MODEL_DIR"
            test -f "$MODEL_DIR/onnx/model.onnx" || { echo "model.onnx missing after extract"; exit 1; }
          fi

      - name: Build native image
        working-directory: service
        # -Pnative runs jOOQ codegen (testcontainers pgvector) then native-image.
        # The committed traced reachability-metadata.json + community metadata repo
        # supply the reflection/resource set. This is the authoritative LINUX gate
        # for the native path (the spike verified macOS/arm64; this proves amd64).
        run: ./mvnw -q -Pnative -DskipTests package

      - name: Native smoke test
        working-directory: service
        # Boots the native binary against a throwaway pgvector and asserts
        # liquibase migration + jOOQ INSERT/SELECT/FTS all return 200.
        run: ./native-smoke.sh
