# Abstract-themes plan benchmark fixtures.
#
# Originally scaffolded as parametrized fixtures in
# tests/test_abstract_themes_plan_integration.py with hardcoded
# dominant_themes substring lists. Moved here because the theme lists
# were a 2026-05-03 snapshot of two specific paper collections, and
# substring coverage against author-curated themes is subjective
# evaluation, not behavioral testing.
#
# The contract checks (RF-2 grounding, search-step sanity, summary
# coverage of the corpus's runtime BERTopic label set) live in
# tests/test_abstract_themes_plan_integration.py and are content-
# independent. This file is the operator-runnable benchmark for
# evaluating summary quality on specific question/corpus pairings.
#
# Schema:
#   schema_version: 1
#   queries: list of
#     - qid: short ID
#       corpus: T3 collection name
#       text: the question
#       dominant_themes_2026_05_03: list of substrings the LLM
#         used at the time the fixture was authored (informational;
#         not a pass/fail gate). Use as a delta inspection signal
#         when re-running.
schema_version: 1
queries:
  - qid: grossberg-neural-networks
    corpus: docs__art-grossberg-papers
    text: "What are the main themes in Grossberg's work on neural networks?"
    dominant_themes_2026_05_03:
      - neural
      - ART
      - adaptive resonance
      - learning
      - attention

  - qid: grossberg-perception
    corpus: docs__art-grossberg-papers
    text: "Give an overview of Grossberg's perception research."
    dominant_themes_2026_05_03:
