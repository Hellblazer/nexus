name: default
description: >-
  Analysis and synthesis of a research area across prose and code corpora.
  Gather from both sides, walk reference chains to find supporting work,
  rank survivors against the caller's criterion, then summarise the
  ranked evidence so downstream agents start from the strongest matches.
dimensions:
  verb: analyze
  scope: global
  strategy: default
required_bindings:
  - area
  - criterion
optional_bindings:
  - limit
default_bindings:
  limit: 12
tags: builtin-template,rdr-078,analyze
plan_json:
  steps:
    - tool: search
      args:
        query: $area
        limit: $limit
      scope:
        taxonomy_domain: prose
        topic: $area
    - tool: search
      args:
        query: $area
        limit: $limit
      scope:
        taxonomy_domain: code
        topic: $area
    - tool: traverse
      args:
        seeds: [$step1.tumblers, $step2.tumblers]
        purpose: reference-chain
        depth: 2
        direction: both
    - tool: rank
      args:
        criterion: $criterion
        inputs: [$step1.tumblers, $step2.tumblers, $step3.tumblers]
    - tool: summarize
      args:
        inputs: $step4.ranked
