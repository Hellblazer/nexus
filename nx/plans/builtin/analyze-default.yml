name: default
description: >-
  Analysis and synthesis of a research area across prose and code corpora.
  Gather from both sides, walk reference chains to find supporting work,
  hydrate the candidates' content, rank against the caller's criterion,
  then summarise the top-ranked evidence.
dimensions:
  verb: analyze
  scope: global
  strategy: default
required_bindings:
  - area
  - criterion
optional_bindings:
  - limit
default_bindings:
  limit: 12
tags: builtin-template,rdr-078,analyze
plan_json:
  steps:
    - tool: search
      args:
        query: $area
        limit: $limit
      scope:
        taxonomy_domain: prose
        topic: $area
    - tool: search
      args:
        query: $area
        limit: $limit
      scope:
        taxonomy_domain: code
        topic: $area
    - tool: traverse
      args:
        seeds: [$step1.tumblers, $step2.tumblers]
        purpose: reference-chain
        depth: 2
        direction: both
    - tool: store_get_many
      args:
        ids: [$step1.ids, $step2.ids]
        collections: [$step1.collections, $step2.collections]
    - tool: rank
      args:
        criterion: $criterion
        inputs: $step4.contents
    - tool: summarize
      args:
        inputs: $step4.contents
