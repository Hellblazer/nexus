name: default
description: Critique / audit / review of a change set. Resolve the changed files to their catalog
  entries, walk decision-evolution history (which RDRs superseded or cited what touches this
  code), hydrate the RDR content, extract the decisions, and compare against the proposed change
  so any drift from prior decisions surfaces explicitly.
dimensions:
  verb: review
  scope: global
  strategy: default
required_bindings:
- changed_paths
optional_bindings:
- depth
default_bindings:
  depth: 1
tags: builtin-template,rdr-078,review
plan_json:
  steps:
  - tool: query
    args:
      question: catalog entries for paths $changed_paths
      subtree: $changed_paths
      corpus: all
  - tool: traverse
    args:
      seeds: $step1.tumblers
      purpose: decision-evolution
      depth: $depth
      direction: in
  - tool: store_get_many
    args:
      ids:
      - $step1.ids
      - $step2.ids
      collections:
      - $step1.collections
      - $step2.collections
  - tool: extract
    args:
      inputs: $step3.contents
      fields: decision,rationale,rdr
  - tool: compare
    args:
      criterion: decision-drift
      inputs: $step3.contents
