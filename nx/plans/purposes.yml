# Purposes registry — RDR-078 P3.
#
# A "purpose" is a human-named alias for a list of catalog link types
# that the traverse operator should walk. Plan templates declare
# ``purpose: <name>`` instead of an explicit ``link_types: [...]`` list
# so the same template stays correct as new link types are introduced.
#
# Each entry maps a purpose name to the link types its traversal
# should follow. Unknown link types (i.e. names not currently in the
# catalog's known set) are dropped at resolution time with a structured
# warning ``purpose_unknown_link_type`` — the resolver returns the
# subset that did match and a plan run continues with what's available.
#
# Sharing model: ships with the nx plugin (scope:global). Project
# overrides may add new purposes in `.nexus/plans/purposes.yml`
# (additive).
#
# Documented at docs/catalog-purposes.md.

find-implementations:
  description: >-
    Walk from a design / RDR doc to the code modules that implement it.
    Used by ``verb:research`` and ``verb:analyze`` scenario templates.
  link_types:
    - implements
    - implements-heuristic

decision-evolution:
  description: >-
    Walk from a doc back through the decision history that authored it
    (RDRs that supersede / amend / cite each other). Used by
    ``verb:review`` and ``verb:debug`` for "what did we decide and why?".
  link_types:
    - supersedes
    - cites

reference-chain:
  description: >-
    Walk citation chains across docs / papers. Used by ``verb:analyze``
    when synthesising across a reference graph (e.g. paper → cited
    work → source RDR).
  link_types:
    - cites
    - quotes

documentation-for:
  description: >-
    Walk from code or an artefact back to the docs that describe it.
    Inverse of ``find-implementations``. Used by ``verb:document`` to
    locate doc-coverage gaps.
  link_types:
    - implements
    - implements-heuristic
    - cites

soft-relations:
  description: >-
    Walk loose semantic associations (``relates``, ``comments``).
    Lower-confidence than ``find-implementations`` or
    ``reference-chain``; useful for exploratory survey traversals.
  link_types:
    - relates
    - comments

all-implementations:
  description: >-
    Strict-only implementation links — excludes ``implements-heuristic``
    so the traversal returns only authored / verified mappings.
  link_types:
    - implements
