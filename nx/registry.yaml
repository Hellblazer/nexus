# registry.yaml - Single source of truth for agent/skill architecture
# Version 2.0 - Nexus T1/T2/T3 storage backend
#
# This registry defines all agents, skills, pipelines, and naming conventions.
# Skills reference this file via ../../registry.yaml rather than duplicating metadata.

version: "2.0"

# Files that derive content from this registry
generated_docs:
  - skills/*/SKILL.md # Agent details, related skills sections

# =============================================================================
# AGENTS
# =============================================================================
# Each agent maps to a skill directory and slash command.
# Model options: opus (complex reasoning), sonnet (balanced), haiku (fast/cheap)
# predecessors/successors: workflow routing hints (NOT automatic dispatch).
# Agents output "Recommended Next Step" blocks; the caller orchestrates dispatch.

agents:
  code-review-expert:
    model: sonnet
    version: "2.0"
    color: purple
    skill: code-review
    slash_command: /review-code
    description: "Reviews code for quality, security, and best practices"
    triggers:
      - "after feature completion"
      - "before pull request"
      - "after refactoring"
      - "after modifying 10+ lines"
    strengths:
      - "Pattern recognition"
      - "Security analysis"
      - "Best practices validation"
    typical_runtime: "15-30 seconds per file"
    predecessors: [developer]
    successors: [test-validator]

  codebase-deep-analyzer:
    model: sonnet
    version: "2.0"
    color: amber
    skill: codebase-analysis
    slash_command: /analyze-code
    description: "Analyzes codebase structure, patterns, and architecture"
    triggers:
      - "exploring new codebase"
      - "onboarding to project"
      - "before major refactoring"
      - "understanding module structure"
    strengths:
      - "Architecture patterns"
      - "Dependency analysis"
      - "Technical debt identification"
    typical_runtime: "30-60 seconds"
    predecessors: []
    successors: [strategic-planner]

  deep-analyst:
    model: opus
    version: "2.0"
    color: blue
    skill: deep-analysis
    slash_command: /deep-analysis
    description: "Thorough analysis of complex problems and system relationships"
    triggers:
      - "investigating performance mysteries"
      - "debugging multi-component interactions"
      - "understanding complex system behavior"
      - "surface-level analysis insufficient"
    strengths:
      - "Root cause analysis"
      - "Cross-cutting concerns"
      - "System behavior modeling"
    typical_runtime: "60-120 seconds"
    predecessors: [codebase-deep-analyzer]
    successors: [strategic-planner]

  deep-research-synthesizer:
    model: sonnet
    version: "2.0"
    color: teal
    skill: research-synthesis
    slash_command: /research
    description: "Research across multiple sources with knowledge synthesis"
    triggers:
      - "researching new topic or technology"
      - "investigating best practices"
      - "comparing approaches"
      - "building comprehensive understanding"
    strengths:
      - "Multi-source synthesis"
      - "Technology comparison"
      - "Best practice discovery"
    typical_runtime: "45-90 seconds"
    predecessors: []
    successors: [knowledge-tidier]

  architect-planner:
    model: opus
    version: "2.0"
    color: green
    skill: architecture
    slash_command: /architecture
    description: "Designs software architecture and creates phased execution plans"
    triggers:
      - "starting complex features requiring architectural design"
      - "planning multi-phase implementations"
      - "before major refactoring"
      - "system design decisions needed"
    strengths:
      - "Architecture design"
      - "Phase planning"
      - "Integration patterns"
    typical_runtime: "60-120 seconds"
    predecessors: [strategic-planner, plan-auditor]
    successors: [developer]

  debugger:
    model: opus
    version: "2.0"
    color: red
    skill: debugging
    slash_command: /debug
    description: "Hypothesis-driven debugging for failures"
    triggers:
      - "test failures"
      - "exceptions with unclear cause"
      - "after 2+ failed fix attempts"
      - "non-deterministic behavior"
    strengths:
      - "Hypothesis generation"
      - "Root cause isolation"
      - "Stack trace analysis"
    typical_runtime: "30-90 seconds"
    predecessors: []
    successors: [developer]

  developer:
    model: sonnet
    version: "2.0"
    color: cyan
    skill: development
    slash_command: /implement
    description: "TDD implementation with test-first methodology"
    triggers:
      - "plan approved by plan-auditor"
      - "user says implement"
      - "bead status is in_progress for implementation"
      - "executing phase from plan"
    strengths:
      - "Test-first development"
      - "Clean code practices"
      - "Modern language patterns"
    typical_runtime: "varies by complexity"
    predecessors: [plan-auditor, architect-planner]
    successors: [code-review-expert, test-validator]

  knowledge-tidier:
    model: haiku
    version: "3.0"
    color: mint
    skill: knowledge-tidying
    slash_command: /knowledge-tidy
    description: "Persists and organizes knowledge in nx store (T3)"
    triggers:
      - "research-synthesis completes"
      - "3 or more validated findings need persisting across sessions"
      - "valuable insights discovered that should survive session end"
      - "consolidating cross-session information into T3"
    strengths:
      - "Knowledge organization"
      - "nx store management"
      - "Deduplication"
    typical_runtime: "15-30 seconds"
    predecessors: [deep-research-synthesizer]
    successors: []


  plan-auditor:
    model: sonnet
    version: "3.0"
    color: orange
    skill: plan-validation
    slash_command: /plan-audit
    description: "Validates implementation plans before execution"
    triggers:
      - "strategic-planner completes a plan"
      - "before starting implementation"
      - "reviewing existing plan"
    strengths:
      - "Plan validation"
      - "Risk identification"
      - "Codebase alignment"
    typical_runtime: "30-60 seconds"
    predecessors: [strategic-planner]
    successors: [architect-planner, developer, plan-enricher]

  plan-enricher:
    model: sonnet
    version: "3.0"
    color: emerald
    skill: enrich-plan
    slash_command: /enrich-plan
    description: "Enriches beads with execution context — file paths, code patterns, constraints, test commands, and audit findings when available"
    triggers:
      - "plan-auditor completes in RDR planning chain"
      - "user says enrich beads or groom plan"
      - "beads need execution context before implementation"
    strengths:
      - "Bead enrichment"
      - "Audit finding integration"
      - "Execution context assembly"
    typical_runtime: "30-60 seconds"
    predecessors: [plan-auditor]
    successors: []

  strategic-planner:
    model: opus
    version: "2.1"  # v2.1: Enhanced bead integration and phase decomposition
    color: indigo
    skill: strategic-planning
    slash_command: /create-plan
    description: "Creates implementation plans before development"
    triggers:
      - "user says implement feature"
      - "starting new epic"
      - "before multi-step development"
      - "before architectural changes"
    strengths:
      - "Task decomposition"
      - "Dependency identification"
      - "Risk assessment"
    typical_runtime: "45-90 seconds"
    predecessors: [codebase-deep-analyzer]
    successors: [plan-auditor]

  substantive-critic:
    model: sonnet
    version: "2.0"
    color: teal
    skill: substantive-critique
    slash_command: /substantive-critique
    description: "Deep constructive critique of code, documentation, plans, and designs"
    triggers:
      - "reviewing an architectural decision or multi-phase plan"
      - "validating an implementation against a spec (not routine fix review)"
      - "verifying claims against evidence"
      - "comprehensive system audit or drift detection"
    strengths:
      - "Structural analysis"
      - "Logic validation"
      - "Gap identification"
    typical_runtime: "30-60 seconds"
    predecessors: []
    successors: []

  test-validator:
    model: sonnet
    version: "2.0"
    color: lime
    skill: test-validation
    slash_command: /test-validate
    description: "Validates test coverage and quality after implementation"
    triggers:
      - "finishing feature implementation"
      - "after fixing a bug"
      - "before merge or pull request"
      - "CI/CD check needed"
    strengths:
      - "Coverage analysis"
      - "Test quality assessment"
      - "Gap identification"
    typical_runtime: "30-60 seconds"
    predecessors: [developer, code-review-expert]
    successors: []

# =============================================================================
# RDR SKILLS (orchestration skills — dispatch to existing agents)
# =============================================================================

rdr_skills:
  # Each rdr_skill has a corresponding commands/*.md file that injects live context
  # (RDR dir from .nexus.yml, existing RDRs, T2 state, beads) before invoking the skill.
  # RDR directory is read from .nexus.yml indexing.rdr_paths[0]; default docs/rdr.

  rdr-create:
    slash_command: /rdr-create
    command_file: commands/rdr-create.md
    description: "Scaffold new RDR from template, assign ID, register in T2"
    triggers:
      - "create an RDR"
      - "new RDR"
      - "start planning document"

  rdr-research:
    slash_command: /rdr-research
    command_file: commands/rdr-research.md
    description: "Add, track, and verify structured research findings"
    triggers:
      - "add research finding"
      - "update RDR research"
      - "verify assumption"
    dispatches_to: [deep-research-synthesizer, codebase-deep-analyzer]

  rdr-gate:
    slash_command: /rdr-gate
    command_file: commands/rdr-gate.md
    description: "Run finalization gate: structural + assumption + AI critique"
    triggers:
      - "gate this RDR"
      - "finalization check"
      - "is this RDR ready"
    dispatches_to: [substantive-critic]

  rdr-accept:
    slash_command: /rdr-accept
    command_file: commands/rdr-accept.md
    description: "Accept a gated RDR — verify gate PASSED, update status, optional planning dispatch"
    dispatches_to: [strategic-planner, plan-auditor, plan-enricher]  # sequential chain, orchestrated by skill
    triggers:
      - "accept this RDR"
      - "mark RDR as accepted"
      - "approve RDR"

  rdr-close:
    slash_command: /rdr-close
    command_file: commands/rdr-close.md
    description: "Close RDR with post-mortem, bead status advisory, T3 archive"
    triggers:
      - "close this RDR"
      - "RDR done"
      - "finish RDR"
    dispatches_to: [knowledge-tidier]

  rdr-audit:
    slash_command: /rdr-audit
    command_file: commands/rdr-audit.md
    description: "Audit a project's RDR lifecycle for silent-scope-reduction base rate, or inspect/manage scheduled periodic audits"
    triggers:
      - "audit this project"
      - "run the silent scope reduction audit"
      - "check base rate on"
      - "periodic audit"
    dispatches_to: [deep-research-synthesizer]

  rdr-list:
    slash_command: /rdr-list
    command_file: commands/rdr-list.md
    description: "List all RDRs with status, type, priority"
    triggers:
      - "list RDRs"
      - "show all RDRs"

  rdr-show:
    slash_command: /rdr-show
    command_file: commands/rdr-show.md
    description: "Display detailed RDR information"
    triggers:
      - "show RDR"
      - "RDR details"

# =============================================================================
# STANDALONE SKILLS
# =============================================================================
# Skills that provide guidance directly without delegating to an agent.
# Different structure from agents: has 'tools' field instead of 'model',
# no predecessors/successors (not part of agent pipelines).

standalone_skills:
  query:
    description: "Multi-step retrieval and analysis via nx_answer MCP tool. Plan-match-first orchestration with auto-hydration and operator dispatch."
    triggers:
      - "cross-corpus consistency check"
      - "structured extraction with comparison"
      - "multi-source synthesis"
      - "evidence-grounded generation"
      - "author or citation query"
  serena-code-nav:
    description: "LSP-backed symbol navigation via Serena MCP — find definitions, all callers, type hierarchies, safe rename, and symbol-scoped editing. Use instead of Grep for any symbol-level task."
    triggers:
      - "find where a symbol is defined"
      - "find all callers of a function"
      - "rename symbol across codebase"
      - "replace a function body"
      - "understand file structure before editing"
      - "symbol-level code navigation"
      - "impact analysis before refactoring"
    tools: [ToolSearch, mcp__plugin_sn_serena__jet_brains_find_symbol, mcp__plugin_sn_serena__find_symbol, mcp__plugin_sn_serena__jet_brains_find_referencing_symbols, mcp__plugin_sn_serena__find_referencing_symbols, mcp__plugin_sn_serena__jet_brains_get_symbols_overview, mcp__plugin_sn_serena__get_symbols_overview, mcp__plugin_sn_serena__jet_brains_type_hierarchy, mcp__plugin_sn_serena__type_hierarchy, mcp__plugin_sn_serena__jet_brains_rename, mcp__plugin_sn_serena__rename_symbol, mcp__plugin_sn_serena__replace_symbol_body, mcp__plugin_sn_serena__insert_before_symbol, mcp__plugin_sn_serena__insert_after_symbol, mcp__plugin_sn_serena__search_for_pattern, mcp__plugin_sn_serena__find_file, mcp__plugin_sn_serena__list_dir]

  cli-controller:
    description: "Expert guidance for controlling interactive CLI applications using tmux-cli"
    triggers:
      - "interactive debugging (pdb, gdb, jshell)"
      - "spawning Claude Code instances"
      - "long-running interactive processes"
      - "REPL sessions"
    tools: [Bash, Read, Write]

  catalog:
    description: "Catalog manipulation — resolve tumblers, create links, seed auto-linker context, file link context"
    triggers:
      - "working with catalog entries"
      - "creating or viewing links"
      - "resolving tumblers"
      - "seeding link context before store_put"
      - "understanding what RDRs relate to a file"
    tools: [Bash, Read]

  nexus:
    description: "Nexus CLI reference for nx search, nx store, nx memory"
    triggers:
      - "using nx commands"
      - "searching knowledge base"
      - "storing findings"
      - "managing session memory"
    tools: [Bash, Read]

  brainstorming-gate:
    description: "Design gate — requires design exploration and user approval before implementation"
    triggers:
      - "about to implement a feature"
      - "building something new"
      - "adding functionality"
    tools: [Read, Glob, Grep, Bash]

  using-nx-skills:
    description: "Skill invocation discipline — check skills before every response"
    triggers:
      - "starting any conversation"
      - "before any action"
    tools: []

  writing-nx-skills:
    description: "Guide for authoring nx plugin skills"
    triggers:
      - "creating new skill"
      - "editing skill"
      - "plugin authorship"
    tools: [Read, Write, Edit, Bash]

  orchestration:
    description: "Agent routing reference — routing tables, pipeline templates, decision framework"
    triggers:
      - "unsure which agent to use"
      - "coordinating multi-agent pipeline"
      - "workflow routing decision"
    tools: []

  receiving-review:
    description: "Technical evaluation of code review feedback — verify before implementing"
    triggers:
      - "receiving code review feedback"
      - "PR review comments to address"
      - "reviewer suggests changes"
    tools: [Read, Grep, Bash]

  git-worktrees:
    description: "Isolated workspace setup via git worktrees with safety verification"
    triggers:
      - "need workspace isolation"
      - "parallel feature work"
      - "before executing implementation plan in isolated branch"
    tools: [Bash, Read]

  finishing-branch:
    description: "Guide branch completion — verify tests, present merge/PR/keep/discard options, cleanup"
    triggers:
      - "implementation complete, ready to merge"
      - "branch done, create PR"
      - "finished feature work"
    tools: [Bash, Read]

  composition-probe:
    description: "Runtime composition smoke test for coordinator beads — dispatches a general-purpose subagent to generate a 30-50 line end-to-end test against the coordinator's entry point, runs it via project-native test runner (py/java/ts auto-detected), reports PASS or FAIL with dependency attribution. Fires on beads tagged metadata.coordinator=true (set by plan-enricher ≥2 deps heuristic). Read-only tool budget per RDR-066 Phase 1a CA-1 finding."
    triggers:
      - "run composition probe on bead X"
      - "verify coordinator bead composition"
      - "check composition before next bead"
      - "/nx:composition-probe <bead-id>"
    tools: [Bash, Read, Grep, Glob]
    dispatches_to: [general-purpose]

  # RDR-078 P5: plan-centric retrieval skills (nexus-05i.9)
  plan-first:
    description: "Gate skill at the top of every retrieval task — tries plan_match first, executes via plan_run if a match clears the threshold, falls through to /nx:query otherwise"
    triggers:
      - "before any retrieval task"
      - "before dispatching search/query"
      - "before decomposing an agentic pipeline"
    tools: [Read]

  research:
    description: "Verb skill for design / architecture / planning tasks — dispatches plan_match with dimensions={verb:research}, executes via plan_run with caller bindings"
    triggers:
      - "how does X work"
      - "design context for Y"
      - "trace Z from spec to code"
    tools: [Read]

  review:
    description: "Verb skill for critique / audit / code-review against a change set — dispatches plan_match with dimensions={verb:review}"
    triggers:
      - "review this change set"
      - "did the refactor drift from the RDR"
      - "critique the new logic"
    tools: [Read]

  analyze:
    description: "Verb skill for analysis / synthesis / cross-corpus tasks — dispatches plan_match with dimensions={verb:analyze}"
    triggers:
      - "compare approaches across corpora"
      - "survey options"
      - "rank candidates by criterion"
    tools: [Read]

  debug:
    description: "Verb skill for dev / debug from a failing code path — dispatches plan_match with dimensions={verb:debug}; intentionally flat (no traverse — Serena handles symbol navigation)"
    triggers:
      - "debug this test failure"
      - "why is this handler failing"
      - "trace the stack of the panic"
    tools: [Read]

  document:
    description: "Verb skill for documentation authoring or audit — dispatches plan_match with dimensions={verb:document}"
    triggers:
      - "audit doc coverage"
      - "find doc-coverage gaps"
      - "what RDRs should I cite when documenting X"
    tools: [Read]

  plan-author:
    description: "Meta-seed skill for authoring new plan templates — dispatches plan_match with dimensions={verb:plan-author} and surveys prior art before drafting"
    triggers:
      - "author a new plan template"
      - "how do I write a plan for X"
      - "draft a plan for this verb"
    tools: [Read]

  plan-inspect:
    description: "Meta-seed skill for inspecting plan metrics or the dimension registry — dispatches plan_match with dimensions={verb:plan-inspect}"
    triggers:
      - "inspect plan metrics"
      - "show dimension registry usage"
      - "what plans are earning their slot"
    tools: [Read]

  plan-promote:
    description: "Meta-seed skill that surveys plan library metrics and ranks promotion candidates — dispatches plan_match with dimensions={verb:plan-promote, strategy:propose}"
    triggers:
      - "promote high-use plans"
      - "rank promotion candidates"
      - "surface plans ready for a higher scope"
    tools: [Read]

# =============================================================================
# PIPELINES
# =============================================================================
# Common agent sequences for different work types

pipelines:
  feature:
    description: "Full feature development from planning to validation"
    sequence:
      - strategic-planner
      - plan-auditor
      - plan-enricher  # conditional: only when rdr-planning-context T1 tag present
      - architect-planner
      - developer
      - code-review-expert
      - test-validator

  bug:
    description: "Bug investigation and fix with review"
    sequence:
      - debugger
      - developer
      - code-review-expert
      - test-validator

  research:
    description: "Research with knowledge persistence"
    sequence:
      - deep-research-synthesizer
      - knowledge-tidier

  onboarding:
    description: "New codebase understanding"
    sequence:
      - codebase-deep-analyzer
      - strategic-planner

  architecture:
    description: "Architectural design and planning"
    sequence:
      - codebase-deep-analyzer
      - deep-analyst
      - strategic-planner
      - plan-auditor
      - architect-planner

# =============================================================================
# NAMING ALIASES
# =============================================================================
# Document intentional mismatches between slash commands and skill directories
# These are NOT bugs - they're deliberate choices for usability

naming_aliases:
  # Format: slash_command -> skill_directory (reason)
  /implement: development              # Action-oriented naming
  /debug: debugging                    # Shorter, memorable
  /create-plan: strategic-planning     # Avoids built-in /plan collision
  /research: research-synthesis        # Common usage
  /knowledge-tidy: knowledge-tidying   # Verb form preference
  /test-validate: test-validation      # Verb form preference
  /plan-audit: plan-validation         # Action-oriented
  /pdf-process: pdf-processing         # Verb form preference
  /analyze-code: codebase-analysis     # Different naming convention

# =============================================================================
# MODEL DISTRIBUTION
# =============================================================================
# Summary for quick reference

model_summary:
  opus: # Complex reasoning, architecture, debugging
    - strategic-planner
    - architect-planner
    - debugger
    - deep-analyst
  sonnet: # Balanced - most common agents
    - code-review-expert
    - codebase-deep-analyzer
    - substantive-critic
    - deep-research-synthesizer
    - developer
    - plan-auditor
    - plan-enricher
    - test-validator
  haiku: # Fast, cheap - utility agents
    - knowledge-tidier

# =============================================================================
# UTILITY COMMANDS
# =============================================================================
# Standalone slash commands that don't delegate to agents.
# These are pure bash + model output commands (no agent invocation required).

utility_commands:
  nx-preflight:
    slash_command: /nx-preflight
    description: "Verify nx plugin dependencies: nx CLI, nx doctor, bd (beads)"
    disable_model_invocation: false
  pdf-process:
    slash_command: /pdf-process
    description: "Index PDF files into nx store for semantic search via nx index pdf"
    disable_model_invocation: false







# =============================================================================
# LIFECYCLE
# =============================================================================

lifecycle:
  deprecation:
    enabled: false
  testing:
    smoke_test: "Invoke each skill, verify no errors"
    integration_test: "Run feature pipeline end-to-end"
  metrics:
    track_invocations: false
