[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nexus"
version = "0.2.0"
description = "Self-hosted semantic search and knowledge management"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.39",
    "chromadb>=0.6",
    "click>=8.1",
    "flask>=3.0",
    "llama-index-core==0.12.7",
    "markdown-it-py>=4.0.0",
    "pymupdf>=1.26.6",
    "pymupdf4llm>=0.2.2",
    "pyyaml>=6.0",
    "structlog>=24.0",
    "tree-sitter-language-pack==0.7.1",
    "voyageai>=0.2",
    "waitress>=3.0",
]

[project.scripts]
nx = "nexus.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/nexus"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: end-to-end tests requiring real services (deselect with '-m not integration')",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=7.0.0",
]
