# RDR-152 nexus-gmiaf.9 C3: GraalVM 25 native-image properties for the Java service.
#
# NOTE: The jOOQ 3.20.11 + GraalVM 25 native DB path is an OPEN ITEM.
# See service/pom.xml (native profile) for the <metadataRepository> exclusion.
#
# Root cause (confirmed nexus-gmiaf.9):
#   --initialize-at-run-time=org.jooq defers SQLDataType/DefaultDataType to runtime.
#   GraalVM 25 analysis partially evaluates DefaultDataType at build time, snapshotting
#   ConcurrentHashMap instances with table=null into the image heap. At runtime the
#   classes appear "already initialized", leaving TYPES_BY_NAME with uninitialised CHMs.
#   First DSL.using() call -> DefaultDSLContext.<clinit> -> SQLDataType.<clinit> ->
#   DefaultDataType.<init> -> ConcurrentHashMap.putIfAbsent -> NPE (table is null).
#
#   Fix attempt (build-time override) fails because DefaultDSLContext.<clinit> pulls in
#   org.xml.sax.helpers.LocatorImpl (via Liquibase/jOOQ internal init), which is a
#   runtime-init type. GraalVM rejects the mixed heap state.
#
#   Workaround path: jlink modular image (service/target/jlink-image) runs the same
#   round-trip correctly and is the production deployment path per RDR-152 S0.4 decision.
#
# This file intentionally contains no Args to avoid conflicting with pom.xml flags.
