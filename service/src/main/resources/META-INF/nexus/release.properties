# RDR-002 release_version contract (conexus PR #78).
#
# release_version is the engine-service RELEASE identity, distinct from the
# Maven app_version (which stays 1.0-SNAPSHOT — the dev coordinate). It is
# STAMPED at native-build time by the engine-service-release workflow from the
# engine-service-vX.Y.Z tag (tag minus the 'engine-service-v' prefix).
#
# Left BLANK in source / on dev + workflow_dispatch builds: VersionHandler then
# reports release_version=null on /version, and an RDR-002 version-pin consumer
# (nx guided-upgrade ez5.4) fail-closes — an engine with no stamped release is
# by definition not a release >= the required floor.
release_version=
