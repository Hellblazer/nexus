{% for e in events %}
<tr class="event-row {{ e.kind }}">
  <td><span class="ts">{{ e.timestamp[:19] }}</span></td>
  <td><code>{{ e.actor }}</code></td>
  <td>{{ e.action }}</td>
  <td><small>{{ e.target }}</small></td>
</tr>
{% endfor %}
{% if not events %}
<tr><td colspan="4" style="text-align:center; color: var(--console-muted);">No matching events. Run <code>nx index repo .</code> to generate activity.</td></tr>
{% endif %}
